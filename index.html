<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>건축물대장 통합 조회 v1.0</title>
  <link rel="icon" href="data:,">
  <!-- ✅ [수정 1] 더미 Kakao SDK <head> 스크립트 제거 → injectKakaoMapScript()로 동적 삽입 -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

    :root {
      --bg: #0a0c10;
      --surface: #13161c;
      --surface2: #1c2028;
      --border: #2a2f3a;
      --accent: #00e5a0;
      --accent2: #0096ff;
      --warn: #ff5a5a;
      --yellow: #ffd060;
      --text: #dde3ee;
      --muted: #6b7589;
      --dim: #3a4055;
      --purple: #c084fc;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #000;
      flex-shrink: 0;
    }

    .logo-text h1 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.3px;
    }

    .logo-text p {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 3px;
    }

    .api-status-group {
      display: flex;
      margin-left: auto;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      transition: all .3s ease;
    }

    .status-badge::before {
      content: '';
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--dim);
    }

    .badge-kakao.on {
      border-color: rgba(0, 229, 160, .4);
      background: rgba(0, 229, 160, .08);
      color: var(--accent);
    }

    .badge-kakao.on::before {
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    .badge-portal.on {
      border-color: rgba(255, 255, 255, .4);
      background: rgba(255, 255, 255, .08);
      color: #fff;
    }

    .badge-portal.on::before {
      background: #fff;
      box-shadow: 0 0 6px #fff;
    }

    .badge-wfs.on {
      border-color: rgba(255, 208, 96, .4);
      background: rgba(255, 208, 96, .08);
      color: var(--yellow);
    }

    .badge-wfs.on::before {
      background: var(--yellow);
      box-shadow: 0 0 6px var(--yellow);
    }

    .status-badge.err {
      border-color: rgba(255, 90, 90, .4);
      background: rgba(255, 90, 90, .08);
      color: var(--warn);
    }

    .status-badge.err::before {
      background: var(--warn);
      box-shadow: 0 0 6px var(--warn);
    }

    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    .sidebar {
      width: 360px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    .sb-section {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      border-bottom: 1px solid var(--border);
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field-label {
      font-size: 11px;
      color: var(--muted);
    }

    /* 👇 여기에 새롭게 추가해 주세요 👇 */
    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .help-link {
      font-size: 11px;
      color: var(--accent2);
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .help-link:hover {
      opacity: 0.8;
      text-decoration: underline;
    }

    /* 👆 여기까지 👆 */

    .field-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 12px 14px;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }

    .field-input:focus {

    }

    .field-input::placeholder {
      color: var(--dim);
    }

    .search-row {
      display: flex;

    }

    .search-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 0 18px;
      font-size: 13px;
      font-weight: 700;

      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .search-btn:hover {
      opacity: .85;
    }

    .search-btn:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .addr-results {
      flex: 1;
      overflow-y: auto;
      padding: 0 24px 24px;
    }

    .addr-item {
      padding: 14px 16px;
      cursor: pointer;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-top: 10px;
      background: var(--surface2);
      transition: all .2s;
    }

    .addr-item:hover {
      border-color: var(--accent);
      background: rgba(0, 229, 160, .05);
      transform: translateY(-1px);
    }

    .addr-main {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
      margin-bottom: 4px;
    }

    .addr-sub {
      font-size: 11px;
      color: var(--muted);
    }

    .addr-type {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-right: 6px;
      font-weight: 700;
    }

    .addr-type.road {
      background: rgba(0, 150, 255, .15);
      color: var(--accent2);
      border: 1px solid rgba(0, 150, 255, .3);
    }

    .addr-type.jibun {
      background: rgba(255, 208, 96, .15);
      color: var(--yellow);
      border: 1px solid rgba(255, 208, 96, .3);
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      min-height: 0;
    }

    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      padding: 0 24px;
      gap: 4px;
      flex-shrink: 0;
    }

    .tab-btn {
      padding: 14px 18px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .2s;
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 700;
    }

    /* 👇 추가할 외부 링크 스타일 👇 */
    .external-links {
      margin-left: auto;
      /* 버튼들을 우측 끝으로 밀어냄 */
      display: none;
      /* 초기에는 숨겨둠 (JS에서 flex로 변경) */
      align-items: center;
      gap: 6px;
      /* 버튼 사이 간격 */
    }

    .external-link-btn {
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);

    /* 국토부 색상 */
    .external-link-btn.molit {

    }

    .external-link-btn.molit:hover {

      border-color: rgba(0, 150, 255, 0.3);
    }

    /* 네이버 색상 */
    .external-link-btn.naver {
      color: #00e56e;
    }

    .external-link-btn.naver:hover {
      background: rgba(0, 229, 110, 0.1);
      border-color: rgba(0, 229, 110, 0.3);
    }

    /* ✅ [수정 4] 탭 패널 구조 — display:none/block 토글용 */
    .tab-panels {
      flex: 1;
      overflow: hidden;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .tab-panel {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      padding-bottom: 80px;
      display: none;
      flex-direction: column;
      gap: 20px;
      min-height: 0;
    }

    .tab-panel.active {
      display: flex;
    }

    /* result 패널 전용 */
    #panel-result {
      gap: 20px;
    }

    .data-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .card-header {
      background: var(--surface2);
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-header h3 {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent2);
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 1px;
      background: var(--border);
    }

    .field-cell {
      background: var(--surface);
      padding: 16px 20px;
    }

    .fc-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .fc-val {
      font-size: 14px;
      font-weight: 600;
      word-break: keep-all;
    }

    .src-bldg {
      color: var(--text);
    }

    .src-vworld {
      color: var(--yellow);
    }

    .fc-val.dim {
      color: var(--dim);
      font-weight: 400;
    }

    pre.json-view {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.7;
      overflow-x: auto;
      white-space: pre-wrap;
    }

    .j-key {
      color: #7ec8e3;
    }

    .j-str {
      color: #a8e6a3;
    }

    .j-num {
      color: var(--yellow);
    }

    .notice-box {
      border-radius: 10px;
      padding: 24px;
      border: 1px solid;
      text-align: center;
    }

    .notice-box.empty {
      background: rgba(107, 117, 137, .05);
      border-color: var(--border);
      color: var(--muted);
    }

    .notice-box.info {
      background: rgba(0, 150, 255, .05);
      border-color: rgba(0, 150, 255, .3);
    }

    .notice-box.err {
      background: rgba(255, 90, 90, .05);
      border-color: rgba(255, 90, 90, .3);
    }

    .notice-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .notice-desc {
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--dim);
      border-radius: 6px;
    }

    .map-container {
      width: 100%;
      height: 520px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface2);
      flex-shrink: 0;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(10, 12, 16, .4);
      border-top-color: #0a0c10;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    .spinner.light {
      border-color: rgba(255, 255, 255, .2);
      border-top-color: #fff;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo-mark">🏢</div>
    <div class="logo-text">
      <h1>건축물대장 통합 조회 v1.0</h1>
      <p>sazk-han</p>
    </div>
    <div class="api-status-group">
      <div id="statusKakao" class="status-badge badge-kakao">Kakao</div>
      <div id="statusPortal" class="status-badge badge-portal">건축물대장</div>
      <div id="statusWfs" class="status-badge badge-wfs">VWorld WFS</div>
    </div>
  </header>

  <div class="container">
    <!-- 사이드바 -->
    <div class="sidebar">
      <div class="sb-section">
        <div class="input-group">
          <div class="label-row">
            <label class="field-label">Kakao REST API Key</label>
            <a href="https://developers.kakao.com/docs/ko/tutorial/start" target="_blank" class="help-link">key 생성하기
              ↗</a>
          </div>
          <input class="field-input" id="kakaoKey" type="password" placeholder="발급받은 키를 입력하세요"
            oninput="checkKakaoKey()" />
        </div>

        <div class="input-group">
          <label class="field-label">Kakao JavaScript Key (지도용)</label>
          <input class="field-input" id="kakaoJsKey" type="password" placeholder="JavaScript 앱 키를 입력하세요"
            oninput="checkKakaoKey()" />
        </div>

        <div class="input-group" style="margin-top:4px;">
          <label class="field-label">도로명 또는 지번 주소</label>
          <div class="search-row">
            <input class="field-input" id="addrInput" placeholder="예: 잠실동 40 / 올림픽로 240"
              onkeydown="if(event.key==='Enter')searchAddr()" />
            <button class="search-btn" id="searchBtn" onclick="searchAddr()">
              <span id="btnText">검색</span>
            </button>

        </div>
      </div>
      <div class="addr-results" id="addrResults"></div>
    </div>

    <!-- 메인 패널 -->
    <div class="main">
      <div class="tab-bar">
        <div class="tab-btn active" onclick="switchTab('result')" id="tab-result">📊 통합 데이터</div>
        <div class="tab-btn" onclick="switchTab('raw')" id="tab-raw">📄 Raw JSON</div>

        <div class="external-links" id="externalLinks">
          <a href="https://rt.molit.go.kr/pt/gis/gis.do?srhThingSecd=A&mobileAt=" target="_blank"
            class="external-link-btn molit">
            🏛️ 국토부실거래가 ↗
          </a>
          <a href="#" target="_blank" rel="noopener noreferrer" class="external-link-btn naver" id="naverBtn">
            🟢 네이버실거래가 ↗
          </a>
        </div>
      </div>

      <!-- ✅ [수정 4] 탭 패널을 DOM에 미리 생성 — 전환 시 innerHTML 재생성 없이 show/hide만 -->
      <div class="tab-panels">
        <div class="tab-panel active" id="panel-result">
          <div class="notice-box empty" style="margin:auto;">
            <div class="notice-title" style="color:#fff;">✅ 건축물 정보 확인</div>
            <div class="notice-desc" style="color:#fff;">좌측에서 주소를 검색하고 항목을 클릭</div>
          </div>
        </div>
        <div class="tab-panel" id="panel-raw"></div>
      </div>
    </div>
  </div>

  <script>
    const APP_CONFIG = {
      SERVICE_KEY: 'ac91064e6b1a5db4893d6937d9d368814e53156a80479c707b535f350df23318',
      VWORLD_KEY: 'E79BB1F4-4D0A-3CDF-A415-B3A4C7291772',
      DEFAULT_KAKAO_REST: '',
      DEFAULT_KAKAO_JS: ''
    };
  </script>

  <script>
    const BASE_API_URL = 'https://apis.data.go.kr/1613000/BldRgstHubService';
    const KAKAO_ADDR_URL = 'https://dapi.kakao.com/v2/local/search/address.json';
    const KAKAO_KEYWORD_URL = 'https://dapi.kakao.com/v2/local/search/keyword.json';
    const WFS_URL = 'https://vworld-proxy-vercel.vercel.app/api/vworld';
    const WFS_MAX = '&maxFeatures=1';

    const WFS_ZONING_LAYERS = [
      { typeName: 'lt_c_uq111', label: '도시지역' },
      { typeName: 'lt_c_uq112', label: '관리지역' },
      { typeName: 'lt_c_uq113', label: '농림지역' },
      { typeName: 'lt_c_uq114', label: '자연환경보전지역' },
      { typeName: 'lt_c_ud801', label: '개발제한구역' },
    ];
    const WFS_DISTRICT_LAYERS = [
      { typeName: 'lt_c_uq121', label: '경관지구' }, { typeName: 'lt_c_uq123', label: '고도지구' },
      { typeName: 'lt_c_uq124', label: '방화지구' }, { typeName: 'lt_c_uq125', label: '방재지구' },
      { typeName: 'lt_c_uq126', label: '보호지구' }, { typeName: 'lt_c_uq128', label: '취락지구' },
      { typeName: 'lt_c_uq129', label: '개발진흥지구' }, { typeName: 'lt_c_uq130', label: '특정용도제한지구' },
      { typeName: 'lt_c_uq162', label: '도시자연공원구역' },
    ];

    const FIELD_GUIDE = [
      { key: 'bldNm', label: '건물(단지)명' }, { key: 'mainPurpsCdNm', label: '주용도' },
      { key: 'useAprDay', label: '준공일(사용승인일)' }, { key: 'prposArea1Nm', label: '용도지역' },
      { key: 'prposArea2Nm', label: '용도지구' }, { key: 'platArea', label: '대지면적' },
      { key: 'archArea', label: '건축면적' }, { key: 'totArea', label: '연면적' },
      { key: 'bcRat', label: '건폐율 (%)' }, { key: 'vlRat', label: '용적률 (%)' },
      { key: 'grndFlrCnt', label: '단지 내 지상 최고층수' }, { key: 'hgt', label: '단지 내 최고 높이' },
      { key: 'hhldCnt', label: '세대수' }, { key: 'totPkngCnt', label: '총 주차대수' },
      { key: 'mainBldCnt', label: '주건축물수' },
    ];

    // 모듈 스코프 상태
    let _addrDocs = [], _lastRawData = null, _subItems = [], _lastCoords = null;
    let _currentTab = 'result', _mapInstance = null, _kakaoSdkPromise = null, _kakaoSdkKey = null;

    document.addEventListener('DOMContentLoaded', () => {
      const savedRest = localStorage.getItem('kakao_key') || APP_CONFIG.DEFAULT_KAKAO_REST;
      const savedJs = localStorage.getItem('kakao_js_key') || APP_CONFIG.DEFAULT_KAKAO_JS;
      if (savedRest) document.getElementById('kakaoKey').value = savedRest;
      if (savedJs) document.getElementById('kakaoJsKey').value = savedJs;
      checkKakaoKey();
    });

    function checkKakaoKey() {
      const key = document.getElementById('kakaoKey').value.trim();
      const jsKey = document.getElementById('kakaoJsKey').value.trim();
      document.getElementById('statusKakao').classList.toggle('on', key.length > 10);
      if (key.length > 10) localStorage.setItem('kakao_key', key);
      if (jsKey.length > 10) localStorage.setItem('kakao_js_key', jsKey);
    }

    // 1. 주소 검색
    async function searchAddr() {
      const key = document.getElementById('kakaoKey').value.trim();
      const query = document.getElementById('addrInput').value.trim();
      if (!key) return alert('Kakao REST API Key를 입력해주세요.');
      if (!query) return alert('주소를 입력해주세요.');

      setSearchLoading(true);
      const resultsEl = document.getElementById('addrResults');
      const encQuery = encodeURIComponent(query);
      const domain = window.location.hostname || 'localhost';

      try {
        const headers = { Authorization: `KakaoAK ${key}` };
        const vwSearchUrl = `${WFS_URL}?endpoint=search&service=search&request=search&version=2.0` +
          `&crs=EPSG:4326&size=15&page=1&query=${encQuery}&type=place&format=json&errorformat=json` +
          `&key=${APP_CONFIG.VWORLD_KEY}&domain=${domain}`;

        const [addrRes, keywordRes, vwRes] = await Promise.all([
          fetch(`${KAKAO_ADDR_URL}?query=${encQuery}&size=15`, { headers }).catch(() => null),
          fetch(`${KAKAO_KEYWORD_URL}?query=${encQuery}&size=15`, { headers }).catch(() => null),
          fetch(vwSearchUrl).catch(() => null),
        ]);

        const addrData = addrRes?.ok ? await addrRes.json() : { documents: [] };
        const keywordData = keywordRes?.ok ? await keywordRes.json() : { documents: [] };
        const vwData = vwRes?.ok ? await vwRes.json() : null;

        let vwDocs = [];
        if (vwData?.response?.status === 'OK' && vwData.response.result?.items) {
          vwDocs = vwData.response.result.items.map(item => ({
            _type: 'keyword', _vworld: true,
            place_name: `[VWorld] ${item.title}`,
            address_name: item.address?.parcel || item.address?.road || item.title,
            road_address_name: item.address?.road || '',
            x: item.point?.x, y: item.point?.y,
          }));
        }

        const combined = [
          ...(keywordData.documents || []).map(d => ({ ...d, _type: 'keyword' })),
          ...vwDocs,
          ...(addrData.documents || []).map(d => ({ ...d, _type: 'address' })),
        ];

        _addrDocs = [];
        const seen = new Set();
        for (const doc of combined) {
          const jibun = doc.address_name;
          if (jibun && !seen.has(jibun)) { seen.add(jibun); _addrDocs.push(doc); }
        }

        if (_addrDocs.length === 0) {
          resultsEl.innerHTML = `<div style="padding:20px;color:var(--warn);font-size:13px;text-align:center;">검색 결과 없음</div>`;
          return;
        }
        renderAddrList(_addrDocs);
      } catch (e) {
        resultsEl.innerHTML = `<div style="padding:20px;color:var(--warn);font-size:13px;">⚠️ 검색 오류: ${e.message}</div>`;
      } finally {
        setSearchLoading(false);
      }
    }

    function renderAddrList(docs) {
      document.getElementById('addrResults').innerHTML = docs.map((doc, idx) => {
        const isKeyword = doc._type === 'keyword';
        const roadNm = doc.road_address?.address_name || doc.road_address_name || '';
        const jibunNm = doc.address?.address_name || doc.address_name || '';
        const hasRoad = !!roadNm;
        return `<div class="addr-item" onclick="handleAddrSelect(${idx})">
          ${isKeyword ? `<div class="addr-main" style="color:var(--accent2);margin-bottom:6px;">${doc.place_name || ''}</div>` : ''}
          <div class="addr-main" style="${isKeyword ? 'font-size:11px;font-weight:400;' : ''}">
            <span class="addr-type ${hasRoad ? 'road' : 'jibun'}">${hasRoad ? '도로명' : '지번'}</span>
            ${hasRoad ? roadNm : jibunNm}
          </div>
          ${hasRoad && jibunNm ? `<div class="addr-sub" style="margin-top:4px;">지번: ${jibunNm}</div>` : ''}
        </div>`;
      }).join('');
    }

    function setSearchLoading(b) {
      document.getElementById('searchBtn').disabled = b;
      document.getElementById('btnText').innerHTML = b ? '<div class="spinner"></div>' : '검색';
    }

    // 2. VWorld WFS URL 생성기 (geomCol 파라미터로 통합)
    function buildWfsUrl(typeName, lng, lat, geomCol = 'geom') {
      const domain = window.location.hostname || 'localhost';
      return `${WFS_URL}?endpoint=wfs&SERVICE=WFS&VERSION=1.1.0&REQUEST=GetFeature` +
        `&TYPENAME=${typeName}&SRSNAME=EPSG:4326&CQL_FILTER=INTERSECTS(${geomCol},POINT(${lng}%20${lat}))` +
        `&outputFormat=application%2Fjson${WFS_MAX}&key=${APP_CONFIG.VWORLD_KEY}&domain=${domain}`;
    }

    async function fetchWfsZoning(lng, lat) {
      const wfsBadge = document.getElementById('statusWfs');

      const zoningResults = await Promise.allSettled(
        WFS_ZONING_LAYERS.map(layer => fetch(buildWfsUrl(layer.typeName, lng, lat)).then(r => r.ok ? r.json() : null).catch(() => null))
      );

      let area1Str = '';
      for (const settled of zoningResults) {
        if (settled.status === 'fulfilled' && settled.value?.features?.length > 0) {
          const props = settled.value.features[0].properties || {};
          const nameProp = props.uname || props.prposArea1Nm || props.uq_nm || props.ud_nm || props.uq111_nm || props.zone_nm || props.name;
          if (nameProp) { area1Str = String(nameProp); break; }
        }
      }

      const districtResults = await Promise.all(
        WFS_DISTRICT_LAYERS.map(async layer => {
          try {
            const res = await fetch(buildWfsUrl(layer.typeName, lng, lat));
            if (!res.ok) return null;
            const json = await res.json();
            const props = json?.features?.[0]?.properties || {};
            const nameVal = props.uname || props.prposArea2Nm || props.uq_nm || props.zone_nm || props.mnm || layer.label;
            return nameVal && String(nameVal).trim() !== '' ? String(nameVal) : null;
          } catch { return null; }
        })
      );

      const area2Str = districtResults.filter(Boolean).join(' / ');
      wfsBadge.className = `status-badge badge-wfs ${area1Str || area2Str ? 'on' : 'warn'}`;

      return { area1Str: area1Str || '—', area2Str: area2Str || '—' };
    }

    // 2-1. VWorld WFS 건축물정보 조회 (ag_geom 컬럼 사용)
    async function fetchWfsBldgInfo(lng, lat) {
      try {
        const res = await fetch(buildWfsUrl('lt_c_bldginfo', lng, lat, 'ag_geom'));
        if (!res.ok) return null;
        const text = await res.text();
        if (text.trim().startsWith('<')) return null;
        return JSON.parse(text)?.features?.[0]?.properties || null;
      } catch { return null; }
    }

    // 3. 주소 선택 → 데이터 병렬 수집
    async function handleAddrSelect(idx) {
      const doc = _addrDocs[idx];
      const lng = parseFloat(doc.x), lat = parseFloat(doc.y);
      const key = document.getElementById('kakaoKey').value.trim();

      const targetAddress = doc.road_address?.address_name || doc.address?.address_name || doc.address_name || '';
      document.getElementById('naverBtn').href = `https://m.land.naver.com/search/result/${encodeURIComponent(targetAddress)}`;
      document.getElementById('externalLinks').style.display = 'flex';

      document.getElementById('panel-result').innerHTML = `
        <div class="notice-box info" style="margin:auto;">
          <div class="spinner light" style="margin:0 auto 16px;width:30px;height:30px;"></div>
          <div class="notice-title">데이터 통합 수집 중...</div>
          <div class="notice-desc">총괄표제부 · 표제부 · VWorld WFS 데이터를 수집하고 있습니다.</div>
        </div>`;
      document.getElementById('panel-raw').innerHTML = '';
      _mapInstance = null;

      let addrObj = doc.address;
      if (!addrObj && doc.address_name) {
        try {
          const r = await fetch(`${KAKAO_ADDR_URL}?query=${encodeURIComponent(doc.address_name)}`, { headers: { Authorization: `KakaoAK ${key}` } });
          const data = await r.json();
          addrObj = data.documents?.[0]?.address;
        } catch { }
      }

      if (!addrObj || !addrObj.b_code) {
        document.getElementById('panel-result').innerHTML = `<div class="notice-box err" style="margin:auto;"><div class="notice-title">⚠️ 주소 정보 누락</div><div class="notice-desc">해당 장소의 정확한 지번을 확인할 수 없습니다.</div></div>`;
        return;
      }

      const baseParams = `ServiceKey=${APP_CONFIG.SERVICE_KEY}&sigunguCd=${addrObj.b_code.slice(0, 5)}&bjdongCd=${addrObj.b_code.slice(5, 10)}&platGbCd=${addrObj.mountain_yn === 'Y' ? '1' : '0'}&bun=${String(parseInt(addrObj.main_address_no) || 0).padStart(4, '0')}&ji=${String(parseInt(addrObj.sub_address_no || '0') || 0).padStart(4, '0')}&_type=json`;
      const urlRecap = `${BASE_API_URL}/getBrRecapTitleInfo?${baseParams}&numOfRows=10&pageNo=1`;
      const urlTitle = `${BASE_API_URL}/getBrTitleInfo?${baseParams}&numOfRows=100&pageNo=1`;

      try {
        const [[resRecap, resTitle], zoningResult, wfsBldgProps] = await Promise.all([
          Promise.all([fetch(urlRecap), fetch(urlTitle)]),
          fetchWfsZoning(lng, lat),
          fetchWfsBldgInfo(lng, lat),
        ]);

        const [textRecap, textTitle] = await Promise.all([resRecap.text(), resTitle.text()]);

        if (resRecap.status === 403 || textRecap.toLowerCase().includes('forbidden')) throw new Error('공공데이터포털 403 Forbidden - 접근 권한 없음');
        if (textRecap.trim().startsWith('<')) throw new Error('공공데이터포털 서버 지연(XML 에러 반환 중)');

        let jsonRecap;
        try { jsonRecap = JSON.parse(textRecap); }
        catch { throw new Error(`공공데이터포털 서버 일시 장애: ${textRecap.substring(0, 30)}...`); }

        let maxFlr = 0, maxHgt = 0, useAprDay = '', jsonTitle = null;
        try {
          if (!textTitle.startsWith('<')) {
            jsonTitle = JSON.parse(textTitle);
            const titleItems = jsonTitle?.response?.body?.items?.item;
            if (titleItems) {
              (Array.isArray(titleItems) ? titleItems : [titleItems]).forEach(t => {
                maxFlr = Math.max(maxFlr, parseFloat(t.grndFlrCnt) || 0);
                maxHgt = Math.max(maxHgt, parseFloat(t.heit || t.hgt) || 0);
                if (!useAprDay && t.useAprDay && String(t.useAprDay).length === 8) useAprDay = String(t.useAprDay);
              });
            }
          }
        } catch { }

        let mainItemsObj = jsonRecap?.response?.body?.items?.item || jsonTitle?.response?.body?.items?.item;

        if (Array.isArray(mainItemsObj) && mainItemsObj.length > 1) {
          const group = mainItemsObj.filter(i => String(i.regstrGbCd) === '2');
          mainItemsObj = group.length > 0 ? group : [mainItemsObj.reduce((best, cur) => (parseFloat(cur.hhldCnt) || 0) > (parseFloat(best.hhldCnt) || 0) ? cur : best)];
        }

        const titleItemsArr = jsonTitle?.response?.body?.items?.item;
        _subItems = titleItemsArr ? (Array.isArray(titleItemsArr) ? titleItemsArr : [titleItemsArr]) : [];

        let isVWorldOnly = false;
        if ((!mainItemsObj || (Array.isArray(mainItemsObj) && mainItemsObj.length === 0)) && wfsBldgProps) {
          mainItemsObj = [{}];
          isVWorldOnly = true;
        }

        const ZERO_INVALID_FIELDS = new Set(['platArea', 'archArea', 'totArea', 'bcRat', 'vlRat', 'hgt']);
        const isBldgEmpty = (k, v) => v == null || v === '' || v === '—' || typeof v === 'object' || (ZERO_INVALID_FIELDS.has(k) && parseFloat(v) === 0);

        if (mainItemsObj) {
          (Array.isArray(mainItemsObj) ? mainItemsObj : [mainItemsObj]).forEach(r => {
            r._source = {};
            const defaultSrc = r.regstrKindCd === '1' ? '총괄' : '표제부';
            FIELD_GUIDE.forEach(g => r._source[g.key] = defaultSrc);

            r.grndFlrCnt = maxFlr > 0 ? maxFlr : (r.grndFlrCnt || '—');
            if (maxFlr > 0) r._source['grndFlrCnt'] = '표제부';

            r.hgt = maxHgt > 0 ? maxHgt : (r.hgt || '—');
            if (maxHgt > 0) r._source['hgt'] = '표제부';

            if ((!r.useAprDay || typeof r.useAprDay === 'object' || String(r.useAprDay).trim() === '') && useAprDay) r.useAprDay = useAprDay;

            r.prposArea1Nm = zoningResult.area1Str !== '—' ? zoningResult.area1Str : (r.prposArea1Nm || '—');
            if (zoningResult.area1Str !== '—') r._source['prposArea1Nm'] = 'vworld';

            r.prposArea2Nm = zoningResult.area2Str !== '—' ? zoningResult.area2Str : (r.prposArea2Nm || '—');
            if (zoningResult.area2Str !== '—') r._source['prposArea2Nm'] = 'vworld';

            if (wfsBldgProps) {
              const mapWfs = { mainPurpsCdNm: wfsBldgProps.usability, useAprDay: wfsBldgProps.useapr_day, platArea: wfsBldgProps.platarea, archArea: wfsBldgProps.archarea, totArea: wfsBldgProps.totalarea, bcRat: wfsBldgProps.bc_rat, vlRat: wfsBldgProps.vl_rat, grndFlrCnt: wfsBldgProps.grnd_flr, hgt: wfsBldgProps.height };
              Object.entries(mapWfs).forEach(([k, wfsVal]) => {
                if (isBldgEmpty(k, r[k]) && !isBldgEmpty(k, wfsVal)) {
                  r[k] = wfsVal;
                  r._source[k] = 'vworld';
                }
              });
              ZERO_INVALID_FIELDS.forEach(k => { if (isBldgEmpty(k, r[k])) r[k] = '—'; });
            }
          });

          _lastRawData = isVWorldOnly ? { response: { header: { resultCode: '00', resultMsg: 'VWORLD ONLY' }, body: { items: { item: mainItemsObj } } } }
            : (jsonRecap?.response?.body?.totalCount === '0' && jsonTitle?.response?.body?.totalCount !== '0') ? jsonTitle : jsonRecap;
        } else {
          _lastRawData = jsonRecap;
        }

        const portalBadge = document.getElementById('statusPortal');
        if (!isVWorldOnly && _lastRawData?.response?.header?.resultCode === '00') {
          portalBadge.className = 'status-badge badge-portal on';
        } else {
          portalBadge.className = 'status-badge badge-portal';
        }

        _lastCoords = { lat, lng };
        renderActiveView();

      } catch (e) {
        document.getElementById('statusPortal').className = 'status-badge badge-portal err';
        document.getElementById('panel-result').innerHTML = `<div class="notice-box err" style="margin:auto;"><div class="notice-title">⚠️ 데이터 호출 오류</div><div class="notice-desc">${e.message}</div></div>`;
        _lastRawData = null;
      }
    }

    // 4. Kakao 지도 설정
    function injectKakaoMapScript(appKey) {
      if (appKey === _kakaoSdkKey && _kakaoSdkPromise) return _kakaoSdkPromise;
      _kakaoSdkKey = appKey;
      return _kakaoSdkPromise = new Promise((resolve, reject) => {
        if (window.kakao?.maps) { resolve(); return; }
        const script = document.createElement('script');
        script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${appKey}&autoload=false`;
        script.onload = () => kakao.maps.load(resolve);
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }

    async function renderKakaoMap(lat, lng) {
      const kakaoKey = document.getElementById('kakaoJsKey').value.trim();
      if (!kakaoKey) return;

      let mapCard = document.getElementById('kakaoMapCard');
      if (!mapCard) {
        mapCard = document.createElement('div');
        mapCard.id = 'kakaoMapCard';
        mapCard.className = 'data-card';
        mapCard.innerHTML = `<div class="card-header"><h3>📍 위치 지도</h3></div><div class="map-container" id="kakaoMapDiv"></div>`;
        document.getElementById('panel-result').appendChild(mapCard);
      }

      try {
        await injectKakaoMapScript(kakaoKey);
        const latlng = new kakao.maps.LatLng(lat, lng);
        if (_mapInstance) {
          _mapInstance.setCenter(latlng);
        } else {
          _mapInstance = new kakao.maps.Map(document.getElementById('kakaoMapDiv'), { center: latlng, level: 3 });
          new kakao.maps.Marker({ position: latlng, map: _mapInstance });
        }
      } catch { }
    }

    // 5. 탭 전환
    function switchTab(tabId) {
      _currentTab = tabId;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`tab-${tabId}`).classList.add('active');
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById(`panel-${tabId}`).classList.add('active');
      if (tabId === 'raw' && _lastRawData) renderRawPanel();
    }

    // 6. 데이터 렌더링 최적화 헬퍼 (단위 변환 통합 로직)
    function formatFieldValue(key, val, dataItem = {}) {
      if (val === '—') return val;
      if (['totArea', 'archArea', 'platArea'].includes(key)) return !isNaN(parseFloat(val)) ? parseFloat(val).toLocaleString('ko-KR') + ' ㎡' : val;
      if (key === 'grndFlrCnt') return val + ' 층';
      if (key === 'hgt' || key === 'heit') return val + ' m';
      if (key === 'hhldCnt') return !isNaN(parseFloat(val)) ? parseFloat(val).toLocaleString('ko-KR') + ' 세대' : val;
      if (key === 'useAprDay' && String(val).length === 8) {
        const year = parseInt(val.substring(0, 4));
        return `${year}-${val.substring(4, 6)}-${val.substring(6, 8)} <span style="font-size:12px;opacity:.8;">(${new Date().getFullYear() - year + 1}년차)</span>`;
      }
      if (key === 'totPkngCnt') {
        const park = parseFloat(val), hhld = parseFloat(dataItem.hhldCnt);
        if (!isNaN(park)) return park.toLocaleString('ko-KR') + '대' + (!isNaN(hhld) && hhld > 0 ? ` <span style="font-size:12px;opacity:.8;">(세대당 ${(park / hhld).toFixed(2)}대)</span>` : '');
      }
      return val;
    }

    function renderActiveView() {
      if (!_lastRawData) return;
      renderResultPanel();
      if (_currentTab === 'raw') renderRawPanel();
    }

    function renderRawPanel() {
      const rawStr = JSON.stringify(_lastRawData, null, 2)
        .replace(/"([^"]+)":/g, '<span class="j-key">"$1"</span>:')
        .replace(/: "([^"]*)"/g, ': <span class="j-str">"$1"</span>')
        .replace(/: (\d+\.?\d*)/g, ': <span class="j-num">$1</span>');
      document.getElementById('panel-raw').innerHTML = `<pre class="json-view">${rawStr}</pre>`;
    }

    function renderResultPanel() {
      const panel = document.getElementById('panel-result');
      const itemsObj = _lastRawData?.response?.body?.items?.item;
      if (_lastRawData?.response?.header?.resultCode !== '00') {
        return panel.innerHTML = `<div class="notice-box err"><div class="notice-title">API 오류</div><div class="notice-desc">${_lastRawData?.response?.header?.resultMsg}</div></div>`;
      }
      if (!itemsObj) {
        return panel.innerHTML = `<div class="notice-box info" style="margin:auto;"><div class="notice-title">데이터 없음</div><div class="notice-desc">해당 지번에는 총괄표제부 데이터가 없습니다.<br>(단독주택, 소규모 상가 등 일반건축물)</div></div>`;
      }

      let html = '';
      (Array.isArray(itemsObj) ? itemsObj : [itemsObj]).forEach((item, idx) => {
        const alertBanner = item.regstrKindCd === '1' && _subItems.length > 0
          ? `<div style="background:rgba(0,150,255,.08); padding:12px 20px; font-size:12px; color:var(--accent2); border-bottom:1px solid var(--border); line-height:1.5;">💡 <b>안내:</b> 현재 카드는 단지 전체(총괄) 정보입니다. 검색하신 특정 부속 건물(유치원, 상가 등)의 상세 스펙은 하단의 <b>[📋 동별 상세 정보]</b>를 확인해주세요.</div>` : '';

        html += `<div class="data-card">
          <div class="card-header"><h3>${item.bldNm || '단지명 없음'}</h3><span style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;">건축물 #${idx + 1}</span></div>
          ${alertBanner}<div class="field-grid">`;

        FIELD_GUIDE.forEach(guide => {
          const rawVal = item[guide.key];
          let val = (rawVal != null && rawVal !== '' && typeof rawVal !== 'object') ? String(rawVal).trim() : '—';
          if (val === '') val = '—';

          let colorClass = val === '—' ? 'dim' : '', sourceBadge = '';
          if (val !== '—') {
            const src = item._source?.[guide.key];
            if (src === 'vworld') { colorClass = 'src-vworld'; sourceBadge = '<span style="font-size:10px; color:var(--yellow); opacity:0.8; margin-left:4px;">(VWorld)</span>'; }
            else if (src === '표제부') { colorClass = 'src-bldg'; sourceBadge = '<span style="font-size:10px; color:var(--accent2); opacity:0.8; margin-left:4px;">(표제부)</span>'; }
            else if (src === '총괄') { colorClass = 'src-bldg'; sourceBadge = '<span style="font-size:10px; color:var(--muted); margin-left:4px;">(총괄)</span>'; }
            val = formatFieldValue(guide.key, val, item);
          }
          html += `<div class="field-cell"><div class="fc-label">${guide.label} ${sourceBadge}</div><div class="fc-val ${colorClass}">${val}</div></div>`;
        });
        html += `</div></div>`;
      });

      if (_subItems.length > 0) {
        html += `<div class="data-card">
          <div class="card-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'" style="cursor:pointer;">
            <h3>📋 동별 상세 정보</h3><span style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;">${_subItems.length}개 동 ▼ 클릭하여 펼치기</span>
          </div><div style="display:none;">`;

        _subItems.forEach((sub, sidx) => {
          html += `<div style="border-top:1px solid var(--border);">
            <div class="card-header" style="background:var(--bg);"><h3 style="color:var(--accent);font-size:13px;">${sub.dongNm?.trim() || sub.bldNm?.trim() || `동 #${sidx + 1}`}</h3><span style="font-size:11px;color:var(--muted);">표제부</span></div>
            <div class="field-grid">`;

          [{ key: 'archArea', label: '건축면적' }, { key: 'totArea', label: '연면적' }, { key: 'grndFlrCnt', label: '최고층수' }, { key: 'heit', label: '최고높이' }, { key: 'hhldCnt', label: '세대수' }]
            .forEach(guide => {
              const rawVal = sub[guide.key];
              let val = (rawVal != null && rawVal !== '' && typeof rawVal !== 'object') ? String(rawVal).trim() : '—';
              if (val === '') val = '—';
              val = formatFieldValue(guide.key, val, sub);
              html += `<div class="field-cell"><div class="fc-label">${guide.label}</div><div class="fc-val ${val === '—' ? 'dim' : 'src-bldg'}">${val}</div></div>`;
            });
          html += `</div></div>`;
        });
        html += `</div></div>`;
      }

      panel.innerHTML = html;
      if (_lastCoords) renderKakaoMap(_lastCoords.lat, _lastCoords.lng);
    }
  </script>
</body>

</html>
