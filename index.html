<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0c10" />
  <title>건축물대장 통합 조회 v1.0</title>
  <link rel="icon" href="data:,">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

    :root {
      --bg: #0a0c10;
      --surface: #13161c;
      --surface2: #1c2028;
      --border: #2a2f3a;
      --accent: #00e5a0;
      --accent2: #0096ff;
      --warn: #ff5a5a;
      --yellow: #ffd060;
      --text: #dde3ee;
      --muted: #6b7589;
      --dim: #3a4055;
      --purple: #c084fc;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      overscroll-behavior-y: none;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      font-size: 15px;
      -webkit-text-size-adjust: 100%;
    }

    /* ─────────── 헤더 ─────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: calc(12px + var(--safe-top)) 16px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo-mark {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 19px;
      color: #000;
      flex-shrink: 0;
    }

    .logo-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.3px;
    }

    .logo-text p {
      font-size: 10px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 2px;
    }

    .status-toggle {
      margin-left: auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 7px 12px;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .status-toggle .dots {
      display: flex;
      gap: 4px;
    }

    .status-toggle .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--dim);
    }

    /* 상태 패널 (펼침) */
    .api-status-group {
      display: none;
      flex-direction: column;
      gap: 8px;
      padding: 0 16px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .api-status-group.open {
      display: flex;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      padding: 9px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      transition: all .3s ease;
    }

    .status-badge::before {
      content: '';
      display: block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--dim);
      flex-shrink: 0;
    }

    .badge-kakao.on {
      border-color: rgba(0, 229, 160, .4);
      background: rgba(0, 229, 160, .08);
      color: var(--accent);
    }

    .badge-kakao.on::before {
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    .badge-portal.on {
      border-color: rgba(255, 255, 255, .4);
      background: rgba(255, 255, 255, .08);
      color: #fff;
    }

    .badge-portal.on::before {
      background: #fff;
      box-shadow: 0 0 6px #fff;
    }

    .badge-wfs.on {
      border-color: rgba(255, 208, 96, .4);
      background: rgba(255, 208, 96, .08);
      color: var(--yellow);
    }

    .badge-wfs.on::before {
      background: var(--yellow);
      box-shadow: 0 0 6px var(--yellow);
    }

    .status-badge.err {
      border-color: rgba(255, 90, 90, .4);
      background: rgba(255, 90, 90, .08);
      color: var(--warn);
    }

    .status-badge.err::before {
      background: var(--warn);
      box-shadow: 0 0 6px var(--warn);
    }

    /* 헤더 상단 미니 점 색상 동기화 */
    .mini.on-kakao {
      background: var(--accent) !important;
      box-shadow: 0 0 5px var(--accent);
    }

    .mini.on-portal {
      background: #fff !important;
      box-shadow: 0 0 5px #fff;
    }

    .mini.on-wfs {
      background: var(--yellow) !important;
      box-shadow: 0 0 5px var(--yellow);
    }

    .mini.err {
      background: var(--warn) !important;
      box-shadow: 0 0 5px var(--warn);
    }

    /* ─────────── 콘텐츠 영역 ─────────── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
    }

    /* API 키 설정 (접이식) */
    .settings {
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .settings-head {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
    }

    .settings-head .chev {
      margin-left: auto;
      transition: transform .25s;
    }

    .settings.open .settings-head .chev {
      transform: rotate(180deg);
    }

    .settings-body {
      display: none;
      flex-direction: column;
      gap: 14px;
      padding: 0 16px 18px;
    }

    .settings.open .settings-body {
      display: flex;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field-label {
      font-size: 12px;
      color: var(--muted);
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .help-link {
      font-size: 12px;
      color: var(--accent2);
      text-decoration: none;
    }

    .field-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      padding: 14px 16px;
      font-size: 16px;
      /* iOS 자동 줌 방지 */
      outline: none;
      transition: border-color .2s;
    }

    .field-input:focus {
      border-color: var(--accent2);
    }

    .field-input::placeholder {
      color: var(--dim);
    }

    /* 탭바 */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .tab-btn {
      flex: 1;
      padding: 14px 8px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .2s;
      text-align: center;
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 700;
    }

    /* 외부링크 - 가로 스크롤 칩 */
    .external-links {
      display: none;
      gap: 8px;
      padding: 12px 16px;
      overflow-x: auto;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      -webkit-overflow-scrolling: touch;
    }

    .external-links::-webkit-scrollbar {
      display: none;
    }

    .external-link-btn {
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: var(--surface2);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .external-link-btn.molit {
      color: var(--accent2);
    }

    .external-link-btn.naver {
      color: #00e56e;
    }

    .external-link-btn.eum {
      color: #ffb84d;
    }

    /* 패널 */
    .tab-panel {
      padding: 16px;
      padding-bottom: calc(120px + var(--safe-bottom));
      display: none;
      flex-direction: column;
      gap: 16px;
    }

    .tab-panel.active {
      display: flex;
    }

    /* 데이터 카드 */
    .data-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .card-header {
      background: var(--surface2);
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-header h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent2);
    }

    /* 모바일: 2열 그리드 */
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
    }

    .field-cell {
      background: var(--surface);
      padding: 14px 16px;
    }

    .fc-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .fc-val {
      font-size: 15px;
      font-weight: 600;
      word-break: keep-all;
      line-height: 1.4;
    }

    .src-bldg {
      color: var(--text);
    }

    .src-vworld {
      color: var(--yellow);
    }

    .fc-val.dim {
      color: var(--dim);
      font-weight: 400;
    }

    pre.json-view {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      line-height: 1.7;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .j-key {
      color: #7ec8e3;
    }

    .j-str {
      color: #a8e6a3;
    }

    .j-num {
      color: var(--yellow);
    }

    .notice-box {
      border-radius: 14px;
      padding: 28px 20px;
      border: 1px solid;
      text-align: center;
    }

    .notice-box.empty {
      background: rgba(107, 117, 137, .05);
      border-color: var(--border);
      color: var(--muted);
    }

    .notice-box.info {
      background: rgba(0, 150, 255, .05);
      border-color: rgba(0, 150, 255, .3);
    }

    .notice-box.err {
      background: rgba(255, 90, 90, .05);
      border-color: rgba(255, 90, 90, .3);
    }

    .notice-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .notice-desc {
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
    }

    .map-container {
      width: 100%;
      height: 360px;
      border-radius: 0 0 14px 14px;
      overflow: hidden;
      background: var(--surface2);
    }

    /* ─────────── 검색결과 시트 (하단 슬라이드업) ─────────── */
    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .55);
      z-index: 90;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }

    .sheet-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .result-sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 100;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      border-top: 1px solid var(--border);
      max-height: 72vh;
      display: flex;
      flex-direction: column;
      transform: translateY(110%);
      transition: transform .3s cubic-bezier(.32, .72, 0, 1);
      padding-bottom: var(--safe-bottom);
    }

    .result-sheet.open {
      transform: translateY(0);
    }

    .sheet-handle {
      padding: 12px 0 8px;
      display: flex;
      justify-content: center;
      flex-shrink: 0;
    }

    .sheet-handle::before {
      content: '';
      width: 40px;
      height: 4px;
      border-radius: 2px;
      background: var(--dim);
    }

    .sheet-title {
      padding: 0 20px 12px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .sheet-close {
      margin-left: auto;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--surface2);
      border: none;
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
    }

    .addr-results {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 16px 20px;
    }

    .addr-item {
      padding: 16px;
      cursor: pointer;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-top: 10px;
      background: var(--surface2);
      transition: all .15s;
    }

    .addr-item:first-child {
      margin-top: 0;
    }

    .addr-item:active {
      border-color: var(--accent);
      background: rgba(0, 229, 160, .08);
    }

    .addr-main {
      font-size: 14px;
      color: var(--text);
      font-weight: 500;
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .addr-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .addr-type {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 5px;
      margin-right: 6px;
      font-weight: 700;
    }

    .addr-type.road {
      background: rgba(0, 150, 255, .15);
      color: var(--accent2);
      border: 1px solid rgba(0, 150, 255, .3);
    }

    .addr-type.jibun {
      background: rgba(255, 208, 96, .15);
      color: var(--yellow);
      border: 1px solid rgba(255, 208, 96, .3);
    }

    /* ─────────── 하단 고정 검색바 ─────────── */
    .search-dock {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 60;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px calc(12px + var(--safe-bottom));
      display: flex;
      gap: 10px;
    }

    .search-dock .field-input {
      flex: 1;
      border-radius: 24px;
    }

    .search-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 24px;
      padding: 0 22px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .search-btn:active {
      opacity: .8;
    }

    .search-btn:disabled {
      opacity: .5;
    }

    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--dim);
      border-radius: 5px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(10, 12, 16, .4);
      border-top-color: #0a0c10;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    .spinner.light {
      border-color: rgba(255, 255, 255, .2);
      border-top-color: #fff;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* 큰 화면일 때 그리드 확장 */
    @media (min-width: 600px) {
      .field-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .search-dock,
      .result-sheet,
      .sheet-backdrop {
        max-width: 480px;
        margin: 0 auto;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo-mark">🏢</div>
    <div class="logo-text">
      <h1>건축물대장 통합 조회</h1>
      <p>sazk-han · v1.0</p>
    </div>
    <div class="status-toggle" onclick="toggleStatus()">
      <span>API</span>
      <div class="dots">
        <span class="dot mini" id="miniKakao"></span>
        <span class="dot mini" id="miniPortal"></span>
        <span class="dot mini" id="miniWfs"></span>
      </div>
    </div>
  </header>

  <div class="api-status-group" id="statusGroup">
    <div id="statusKakao" class="status-badge badge-kakao">Kakao 주소 검색</div>
    <div id="statusPortal" class="status-badge badge-portal">건축물대장 (공공데이터)</div>
    <div id="statusWfs" class="status-badge badge-wfs">VWorld WFS 용도지역</div>
  </div>

  <!-- API 키 설정 (접이식) -->
  <div class="settings" id="settings">
    <div class="settings-head" onclick="toggleSettings()">
      🔑 <span>API 키 설정</span>
      <span class="chev">▾</span>
    </div>
    <div class="settings-body">
      <div class="input-group">
        <div class="label-row">
          <label class="field-label">Kakao REST API Key</label>
          <a href="https://developers.kakao.com/docs/ko/tutorial/start" target="_blank" class="help-link">key 생성 ↗</a>
        </div>
        <input class="field-input" id="kakaoKey" type="password" placeholder="발급받은 키를 입력하세요"
          oninput="checkKakaoKey()" />
      </div>
      <div class="input-group">
        <label class="field-label">Kakao JavaScript Key (지도용)</label>
        <input class="field-input" id="kakaoJsKey" type="password" placeholder="JavaScript 앱 키를 입력하세요"
          oninput="checkKakaoKey()" />
      </div>
    </div>
  </div>

  <!-- 탭바 -->
  <div class="tab-bar">
    <div class="tab-btn active" onclick="switchTab('result')" id="tab-result">📊 통합 데이터</div>
    <div class="tab-btn" onclick="switchTab('raw')" id="tab-raw">📄 Raw JSON</div>
  </div>

  <!-- 외부링크 칩 -->
  <div class="external-links" id="externalLinks">
    <a href="https://rt.molit.go.kr/pt/gis/gis.do?srhThingSecd=A&mobileAt=" target="_blank"
      class="external-link-btn molit">🏛️ 국토부 실거래가</a>
    <a href="#" target="_blank" rel="noopener noreferrer" class="external-link-btn naver" id="naverBtn">🟢 네이버 실거래가</a>
    <a href="#" target="_blank" rel="noopener noreferrer" class="external-link-btn eum" id="eumBtn">🗺️ 토지이음</a>
  </div>

  <!-- 콘텐츠 -->
  <div class="scroll-area">
    <div class="tab-panel active" id="panel-result">
      <div class="notice-box empty" style="margin:auto;">
        <div class="notice-title" style="color:#fff;">✅ 건축물 정보 확인</div>
        <div class="notice-desc" style="color:#fff;">하단 검색창에 주소를 입력하고 결과를 선택하세요</div>
      </div>
    </div>
    <div class="tab-panel" id="panel-raw"></div>
  </div>

  <!-- 하단 고정 검색바 -->
  <div class="search-dock">
    <input class="field-input" id="addrInput" placeholder="잠실동 40 / 올림픽로 240"
      onkeydown="if(event.key==='Enter')searchAddr()" />
    <button class="search-btn" id="searchBtn" onclick="searchAddr()">
      <span id="btnText">검색</span>
    </button>
  </div>

  <!-- 검색결과 시트 -->
  <div class="sheet-backdrop" id="sheetBackdrop" onclick="closeSheet()"></div>
  <div class="result-sheet" id="resultSheet">
    <div class="sheet-handle" onclick="closeSheet()"></div>
    <div class="sheet-title">
      📍 검색 결과
      <button class="sheet-close" onclick="closeSheet()">✕</button>
    </div>
    <div class="addr-results" id="addrResults"></div>
