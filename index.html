<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>건축물대장 통합 조회 v1.0</title>
  <link rel="icon" href="data:,">
  <!-- ✅ [수정 1] 더미 Kakao SDK <head> 스크립트 제거 → injectKakaoMapScript()로 동적 삽입 -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

    :root {
      --bg: #0a0c10;
      --surface: #13161c;
      --surface2: #1c2028;
      --border: #2a2f3a;
      --accent: #00e5a0;
      --accent2: #0096ff;
      --warn: #ff5a5a;
      --yellow: #ffd060;
      --text: #dde3ee;
      --muted: #6b7589;
      --dim: #3a4055;
      --purple: #c084fc;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #000;
      flex-shrink: 0;
    }

    .logo-text h1 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.3px;
    }

    .logo-text p {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 3px;
    }

    .api-status-group {
      display: flex;
      margin-left: auto;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      transition: all .3s ease;
    }

    .status-badge::before {
      content: '';
      display: block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--dim);
    }

    .badge-kakao.on {
      border-color: rgba(0, 229, 160, .4);
      background: rgba(0, 229, 160, .08);
      color: var(--accent);
    }

    .badge-kakao.on::before {
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    .badge-portal.on {
      border-color: rgba(255, 255, 255, .4);
      background: rgba(255, 255, 255, .08);
      color: #fff;
    }

    .badge-portal.on::before {
      background: #fff;
      box-shadow: 0 0 6px #fff;
    }

    .badge-wfs.on {
      border-color: rgba(255, 208, 96, .4);
      background: rgba(255, 208, 96, .08);
      color: var(--yellow);
    }

    .badge-wfs.on::before {
      background: var(--yellow);
      box-shadow: 0 0 6px var(--yellow);
    }

    .status-badge.err {
      border-color: rgba(255, 90, 90, .4);
      background: rgba(255, 90, 90, .08);
      color: var(--warn);
    }

    .status-badge.err::before {
      background: var(--warn);
      box-shadow: 0 0 6px var(--warn);
    }

    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    .sidebar {
      width: 360px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    .sb-section {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      border-bottom: 1px solid var(--border);
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field-label {
      font-size: 11px;
      color: var(--muted);
    }

    /* 👇 여기에 새롭게 추가해 주세요 👇 */
    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .help-link {
      font-size: 11px;
      color: var(--accent2);
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .help-link:hover {
      opacity: 0.8;
      text-decoration: underline;
    }

    /* 👆 여기까지 👆 */

    .field-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 12px 14px;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }

    .field-input:focus {
      border-color: var(--accent2);
    }

    .field-input::placeholder {
      color: var(--dim);
    }

    .search-row {
      display: flex;
      gap: 8px;
    }

    .search-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 0 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .search-btn:hover {
      opacity: .85;
    }

    .search-btn:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .addr-results {
      flex: 1;
      overflow-y: auto;
      padding: 0 24px 24px;
    }

    .addr-item {
      padding: 14px 16px;
      cursor: pointer;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-top: 10px;
      background: var(--surface2);
      transition: all .2s;
    }

    .addr-item:hover {
      border-color: var(--accent);
      background: rgba(0, 229, 160, .05);
      transform: translateY(-1px);
    }

    .addr-main {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
      margin-bottom: 4px;
    }

    .addr-sub {
      font-size: 11px;
      color: var(--muted);
    }

    .addr-type {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-right: 6px;
      font-weight: 700;
    }

    .addr-type.road {
      background: rgba(0, 150, 255, .15);
      color: var(--accent2);
      border: 1px solid rgba(0, 150, 255, .3);
    }

    .addr-type.jibun {
      background: rgba(255, 208, 96, .15);
      color: var(--yellow);
      border: 1px solid rgba(255, 208, 96, .3);
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      min-height: 0;
    }

    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      padding: 0 24px;
      gap: 4px;
      flex-shrink: 0;
    }

    .tab-btn {
      padding: 14px 18px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .2s;
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 700;
    }

    /* 👇 추가할 외부 링크 스타일 👇 */
    .external-links {
      margin-left: auto;
      /* 버튼들을 우측 끝으로 밀어냄 */
      display: none;
      /* 초기에는 숨겨둠 (JS에서 flex로 변경) */
      align-items: center;
      gap: 6px;
      /* 버튼 사이 간격 */
    }

    .external-link-btn {
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      transition: all .2s;
    }

    /* 국토부 색상 */
    .external-link-btn.molit {
      color: var(--accent2);
    }

    .external-link-btn.molit:hover {
      background: rgba(0, 150, 255, 0.1);
      border-color: rgba(0, 150, 255, 0.3);
    }

    /* 네이버 색상 */
    .external-link-btn.naver {
      color: #00e56e;
    }

    .external-link-btn.naver:hover {
      background: rgba(0, 229, 110, 0.1);
      border-color: rgba(0, 229, 110, 0.3);
    }

    /* ✅ [수정 4] 탭 패널 구조 — display:none/block 토글용 */
    .tab-panels {
      flex: 1;
      overflow: hidden;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .tab-panel {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      padding-bottom: 80px;
      display: none;
      flex-direction: column;
      gap: 20px;
      min-height: 0;
    }

    .tab-panel.active {
      display: flex;
    }

    /* result 패널 전용 */
    #panel-result {
      gap: 20px;
    }

    .data-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .card-header {
      background: var(--surface2);
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-header h3 {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent2);
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 1px;
      background: var(--border);
    }

    .field-cell {
      background: var(--surface);
      padding: 16px 20px;
    }

    .fc-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .fc-val {
      font-size: 14px;
      font-weight: 600;
      word-break: keep-all;
    }

    .src-bldg {
      color: var(--text);
    }

    .src-vworld {
      color: var(--yellow);
    }

    .fc-val.dim {
      color: var(--dim);
      font-weight: 400;
    }

    pre.json-view {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.7;
      overflow-x: auto;
      white-space: pre-wrap;
    }

    .j-key {
      color: #7ec8e3;
    }

    .j-str {
      color: #a8e6a3;
    }

    .j-num {
      color: var(--yellow);
    }

    .notice-box {
      border-radius: 10px;
      padding: 24px;
      border: 1px solid;
      text-align: center;
    }

    .notice-box.empty {
      background: rgba(107, 117, 137, .05);
      border-color: var(--border);
      color: var(--muted);
    }

    .notice-box.info {
      background: rgba(0, 150, 255, .05);
      border-color: rgba(0, 150, 255, .3);
    }

    .notice-box.err {
      background: rgba(255, 90, 90, .05);
      border-color: rgba(255, 90, 90, .3);
    }

    .notice-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .notice-desc {
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--dim);
      border-radius: 6px;
    }

    .map-container {
      width: 100%;
      height: 520px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface2);
      flex-shrink: 0;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(10, 12, 16, .4);
      border-top-color: #0a0c10;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    .spinner.light {
      border-color: rgba(255, 255, 255, .2);
      border-top-color: #fff;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

  <header>
    <div class="logo-mark">🏢</div>
    <div class="logo-text">
      <h1>건축물대장 통합 조회 v1.0</h1>
      <p>sazk-han</p>
    </div>
    <div class="api-status-group">
      <div id="statusKakao" class="status-badge badge-kakao">Kakao</div>
      <div id="statusPortal" class="status-badge badge-portal">건축물대장</div>
      <div id="statusWfs" class="status-badge badge-wfs">VWorld WFS</div>
    </div>
  </header>

  <div class="container">
    <!-- 사이드바 -->
    <div class="sidebar">
      <div class="sb-section">
        <div class="input-group">
          <div class="label-row">
            <label class="field-label">Kakao REST API Key</label>
            <a href="https://developers.kakao.com/docs/ko/tutorial/start" target="_blank" class="help-link">key 생성하기
              ↗</a>
          </div>
          <input class="field-input" id="kakaoKey" type="password" placeholder="발급받은 키를 입력하세요"
            oninput="checkKakaoKey()" />
        </div>

        <div class="input-group">
          <label class="field-label">Kakao JavaScript Key (지도용)</label>
          <input class="field-input" id="kakaoJsKey" type="password" placeholder="JavaScript 앱 키를 입력하세요"
            oninput="checkKakaoKey()" />
        </div>

        <div class="input-group" style="margin-top:4px;">
          <label class="field-label">도로명 또는 지번 주소</label>
          <div class="search-row">
            <input class="field-input" id="addrInput" placeholder="예: 잠실동 40 / 올림픽로 240"
              onkeydown="if(event.key==='Enter')searchAddr()" />
            <button class="search-btn" id="searchBtn" onclick="searchAddr()">
              <span id="btnText">검색</span>
            </button>
          </div>
        </div>
      </div>
      <div class="addr-results" id="addrResults"></div>
    </div>

    <!-- 메인 패널 -->
    <div class="main">
      <div class="tab-bar">
        <div class="tab-btn active" onclick="switchTab('result')" id="tab-result">📊 통합 데이터</div>
        <div class="tab-btn" onclick="switchTab('raw')" id="tab-raw">📄 Raw JSON</div>

        <div class="external-links" id="externalLinks">
          <a href="https://rt.molit.go.kr/pt/gis/gis.do?srhThingSecd=A&mobileAt=" target="_blank"
            class="external-link-btn molit">
            🏛️ 국토부실거래가 ↗
          </a>
          <a href="#" target="_blank" rel="noopener noreferrer" class="external-link-btn naver" id="naverBtn">
            🟢 네이버실거래가 ↗
          </a>
        </div>
      </div>

      <!-- ✅ [수정 4] 탭 패널을 DOM에 미리 생성 — 전환 시 innerHTML 재생성 없이 show/hide만 -->
      <div class="tab-panels">
        <div class="tab-panel active" id="panel-result">
          <div class="notice-box empty" style="margin:auto;">
            <div class="notice-title" style="color:#fff;">✅ 건축물 정보 확인</div>
            <div class="notice-desc" style="color:#fff;">좌측에서 주소를 검색하고 항목을 클릭</div>
          </div>
        </div>
        <div class="tab-panel" id="panel-raw"></div>
      </div>
    </div>
  </div>

      DEFAULT_KAKAO_REST: '',
      DEFAULT_KAKAO_JS: ''
    };
