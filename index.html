<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0c10" />
  <title>건축물대장 통합 조회 v1.0</title>
  <link rel="icon" href="data:,">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

    :root {
      --bg: #0a0c10;
      --surface: #13161c;
      --surface2: #1c2028;
      --border: #2a2f3a;
      --accent: #00e5a0;
      --accent2: #0096ff;
      --warn: #ff5a5a;
      --yellow: #ffd060;
      --text: #dde3ee;
      --muted: #6b7589;
      --dim: #3a4055;
      --purple: #c084fc;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      overscroll-behavior-y: none;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      font-size: 15px;
      -webkit-text-size-adjust: 100%;
    }

    /* ─────────── 헤더 ─────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: calc(12px + var(--safe-top)) 16px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .logo-mark {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 19px;
      color: #000;
      flex-shrink: 0;
    }

    .logo-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.3px;
    }

    .logo-text p {
      font-size: 10px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 2px;
    }

    .status-toggle {
      margin-left: auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 7px 12px;
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .status-toggle .dots {
      display: flex;
      gap: 4px;
    }

    .status-toggle .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--dim);
    }

    /* 상태 패널 (펼침) */
    .api-status-group {
      display: none;
      flex-direction: column;
      gap: 8px;
      padding: 0 16px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .api-status-group.open {
      display: flex;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      padding: 9px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      transition: all .3s ease;
    }

    .status-badge::before {
      content: '';
      display: block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--dim);
      flex-shrink: 0;
    }

    .badge-kakao.on {
      border-color: rgba(0, 229, 160, .4);
      background: rgba(0, 229, 160, .08);
      color: var(--accent);
    }

    .badge-kakao.on::before {
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    .badge-portal.on {
      border-color: rgba(255, 255, 255, .4);
      background: rgba(255, 255, 255, .08);
      color: #fff;
    }

    .badge-portal.on::before {
      background: #fff;
      box-shadow: 0 0 6px #fff;
    }

    .badge-wfs.on {
      border-color: rgba(255, 208, 96, .4);
      background: rgba(255, 208, 96, .08);
      color: var(--yellow);
    }

    .badge-wfs.on::before {
      background: var(--yellow);
      box-shadow: 0 0 6px var(--yellow);
    }

    .status-badge.err {
      border-color: rgba(255, 90, 90, .4);
      background: rgba(255, 90, 90, .08);
      color: var(--warn);
    }

    .status-badge.err::before {
      background: var(--warn);
      box-shadow: 0 0 6px var(--warn);
    }

    /* 헤더 상단 미니 점 색상 동기화 */
    .mini.on-kakao {
      background: var(--accent) !important;
      box-shadow: 0 0 5px var(--accent);
    }

    .mini.on-portal {
      background: #fff !important;
      box-shadow: 0 0 5px #fff;
    }

    .mini.on-wfs {
      background: var(--yellow) !important;
      box-shadow: 0 0 5px var(--yellow);
    }

    .mini.err {
      background: var(--warn) !important;
      box-shadow: 0 0 5px var(--warn);
    }

    /* ─────────── 콘텐츠 영역 ─────────── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
    }

    /* API 키 설정 (접이식) */
    .settings {
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .settings-head {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
    }

    .settings-head .chev {
      margin-left: auto;
      transition: transform .25s;
    }

    .settings.open .settings-head .chev {
      transform: rotate(180deg);
    }

    .settings-body {
      display: none;
      flex-direction: column;
      gap: 14px;
      padding: 0 16px 18px;
    }

    .settings.open .settings-body {
      display: flex;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .field-label {
      font-size: 12px;
      color: var(--muted);
    }

    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .help-link {
      font-size: 12px;
      color: var(--accent2);
      text-decoration: none;
    }

    .field-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      padding: 14px 16px;
      font-size: 16px;
      /* iOS 자동 줌 방지 */
      outline: none;
      transition: border-color .2s;
    }

    .field-input:focus {
      border-color: var(--accent2);
    }

    .field-input::placeholder {
      color: var(--dim);
    }

    /* 탭바 */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .tab-btn {
      flex: 1;
      padding: 14px 8px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .2s;
      text-align: center;
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 700;
    }

    /* 외부링크 - 가로 스크롤 칩 */
    .external-links {
      display: none;
      gap: 8px;
      padding: 12px 16px;
      overflow-x: auto;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      -webkit-overflow-scrolling: touch;
    }

    .external-links::-webkit-scrollbar {
      display: none;
    }

    .external-link-btn {
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: var(--surface2);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .external-link-btn.molit {
      color: var(--accent2);
    }

    .external-link-btn.naver {
      color: #00e56e;
    }

    .external-link-btn.eum {
      color: #ffb84d;
    }

    /* 패널 */
    .tab-panel {
      padding: 16px;
      padding-bottom: calc(120px + var(--safe-bottom));
      display: none;
      flex-direction: column;
      gap: 16px;
    }

    .tab-panel.active {
      display: flex;
    }

    /* 데이터 카드 */
    .data-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .card-header {
      background: var(--surface2);
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-header h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent2);
    }

    /* 모바일: 2열 그리드 */
    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
    }

    .field-cell {
      background: var(--surface);
      padding: 14px 16px;
    }

    .fc-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .fc-val {
      font-size: 15px;
      font-weight: 600;
      word-break: keep-all;
      line-height: 1.4;
    }

    .src-bldg {
      color: var(--text);
    }

    .src-vworld {
      color: var(--yellow);
    }

    .fc-val.dim {
      color: var(--dim);
      font-weight: 400;
    }

    pre.json-view {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      line-height: 1.7;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .j-key {
      color: #7ec8e3;
    }

    .j-str {
      color: #a8e6a3;
    }

    .j-num {
      color: var(--yellow);
    }

    .notice-box {
      border-radius: 14px;
      padding: 28px 20px;
      border: 1px solid;
      text-align: center;
    }

    .notice-box.empty {
      background: rgba(107, 117, 137, .05);
      border-color: var(--border);
      color: var(--muted);
    }

    .notice-box.info {
      background: rgba(0, 150, 255, .05);
      border-color: rgba(0, 150, 255, .3);
    }

    .notice-box.err {
      background: rgba(255, 90, 90, .05);
      border-color: rgba(255, 90, 90, .3);
    }

    .notice-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .notice-desc {
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
    }

    .map-container {
      width: 100%;
      height: 360px;
      border-radius: 0 0 14px 14px;
      overflow: hidden;
      background: var(--surface2);
    }

    /* ─────────── 검색결과 시트 (하단 슬라이드업) ─────────── */
    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .55);
      z-index: 90;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
    }

    .sheet-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .result-sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 100;
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      border-top: 1px solid var(--border);
      max-height: 72vh;
      display: flex;
      flex-direction: column;
      transform: translateY(110%);
      transition: transform .3s cubic-bezier(.32, .72, 0, 1);
      padding-bottom: var(--safe-bottom);
    }

    .result-sheet.open {
      transform: translateY(0);
    }

    .sheet-handle {
      padding: 12px 0 8px;
      display: flex;
      justify-content: center;
      flex-shrink: 0;
    }

    .sheet-handle::before {
      content: '';
      width: 40px;
      height: 4px;
      border-radius: 2px;
      background: var(--dim);
    }

    .sheet-title {
      padding: 0 20px 12px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .sheet-close {
      margin-left: auto;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--surface2);
      border: none;
      color: var(--muted);
      font-size: 16px;
      cursor: pointer;
    }

    .addr-results {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 12px 16px 20px;
    }

    .addr-item {
      padding: 16px;
      cursor: pointer;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-top: 10px;
      background: var(--surface2);
      transition: all .15s;
    }

    .addr-item:first-child {
      margin-top: 0;
    }

    .addr-item:active {
      border-color: var(--accent);
      background: rgba(0, 229, 160, .08);
    }

    .addr-main {
      font-size: 14px;
      color: var(--text);
      font-weight: 500;
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .addr-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .addr-type {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 5px;
      margin-right: 6px;
      font-weight: 700;
    }

    .addr-type.road {
      background: rgba(0, 150, 255, .15);
      color: var(--accent2);
      border: 1px solid rgba(0, 150, 255, .3);
    }

    .addr-type.jibun {
      background: rgba(255, 208, 96, .15);
      color: var(--yellow);
      border: 1px solid rgba(255, 208, 96, .3);
    }

    /* ─────────── 하단 고정 검색바 ─────────── */
    .search-dock {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 60;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px calc(12px + var(--safe-bottom));
      display: flex;
      gap: 10px;
    }

    .search-dock .field-input {
      flex: 1;
      border-radius: 24px;
    }

    .search-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 24px;
      padding: 0 22px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .search-btn:active {
      opacity: .8;
    }

    .search-btn:disabled {
      opacity: .5;
    }

    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--dim);
      border-radius: 5px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(10, 12, 16, .4);
      border-top-color: #0a0c10;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    .spinner.light {
      border-color: rgba(255, 255, 255, .2);
      border-top-color: #fff;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* 큰 화면일 때 그리드 확장 */
    @media (min-width: 600px) {
      .field-grid {
        grid-template-columns: repeat(3, 1fr);
      }

      .search-dock,
      .result-sheet,
      .sheet-backdrop {
        max-width: 480px;
        margin: 0 auto;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo-mark">🏢</div>
    <div class="logo-text">
      <h1>건축물대장 통합 조회</h1>
      <p>sazk-han · v1.0</p>
    </div>
    <div class="status-toggle" onclick="toggleStatus()">
      <span>API</span>
      <div class="dots">
        <span class="dot mini" id="miniKakao"></span>
        <span class="dot mini" id="miniPortal"></span>
        <span class="dot mini" id="miniWfs"></span>
      </div>
    </div>
  </header>

  <div class="api-status-group" id="statusGroup">
    <div id="statusKakao" class="status-badge badge-kakao">Kakao 주소 검색</div>
    <div id="statusPortal" class="status-badge badge-portal">건축물대장 (공공데이터)</div>
    <div id="statusWfs" class="status-badge badge-wfs">VWorld WFS 용도지역</div>
  </div>

  <!-- API 키 설정 (접이식) -->
  <div class="settings" id="settings">
    <div class="settings-head" onclick="toggleSettings()">
      🔑 <span>API 키 설정</span>
      <span class="chev">▾</span>
    </div>
    <div class="settings-body">
      <div class="input-group">
        <div class="label-row">
          <label class="field-label">Kakao REST API Key</label>
          <a href="https://developers.kakao.com/docs/ko/tutorial/start" target="_blank" class="help-link">key 생성 ↗</a>
        </div>
        <input class="field-input" id="kakaoKey" type="password" placeholder="발급받은 키를 입력하세요"
          oninput="checkKakaoKey()" />
      </div>
      <div class="input-group">
        <label class="field-label">Kakao JavaScript Key (지도용)</label>
        <input class="field-input" id="kakaoJsKey" type="password" placeholder="JavaScript 앱 키를 입력하세요"
          oninput="checkKakaoKey()" />
      </div>
    </div>
  </div>

  <!-- 탭바 -->
  <div class="tab-bar">
    <div class="tab-btn active" onclick="switchTab('result')" id="tab-result">📊 통합 데이터</div>
    <div class="tab-btn" onclick="switchTab('raw')" id="tab-raw">📄 Raw JSON</div>
  </div>

  <!-- 외부링크 칩 -->
  <div class="external-links" id="externalLinks">
    <a href="https://rt.molit.go.kr/pt/gis/gis.do?srhThingSecd=A&mobileAt=" target="_blank"
      class="external-link-btn molit">🏛️ 국토부 실거래가</a>
    <a href="#" target="_blank" rel="noopener noreferrer" class="external-link-btn naver" id="naverBtn">🟢 네이버 실거래가</a>
    <a href="#" target="_blank" rel="noopener noreferrer" class="external-link-btn eum" id="eumBtn">🗺️ 토지이음</a>
  </div>

  <!-- 콘텐츠 -->
  <div class="scroll-area">
    <div class="tab-panel active" id="panel-result">
      <div class="notice-box empty" style="margin:auto;">
        <div class="notice-title" style="color:#fff;">✅ 건축물 정보 확인</div>
        <div class="notice-desc" style="color:#fff;">하단 검색창에 주소를 입력하고 결과를 선택하세요</div>
      </div>
    </div>
    <div class="tab-panel" id="panel-raw"></div>
  </div>

  <!-- 하단 고정 검색바 -->
  <div class="search-dock">
    <input class="field-input" id="addrInput" placeholder="잠실동 40 / 올림픽로 240"
      onkeydown="if(event.key==='Enter')searchAddr()" />
    <button class="search-btn" id="searchBtn" onclick="searchAddr()">
      <span id="btnText">검색</span>
    </button>
  </div>

  <!-- 검색결과 시트 -->
  <div class="sheet-backdrop" id="sheetBackdrop" onclick="closeSheet()"></div>
  <div class="result-sheet" id="resultSheet">
    <div class="sheet-handle" onclick="closeSheet()"></div>
    <div class="sheet-title">
      📍 검색 결과
      <button class="sheet-close" onclick="closeSheet()">✕</button>
    </div>
    <div class="addr-results" id="addrResults"></div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════
    //  앱 설정
    // ═══════════════════════════════════════════════════════════
    const APP_CONFIG = {
      SERVICE_KEY: 'ac91064e6b1a5db4893d6937d9d368814e53156a80479c707b535f350df23318',

      // 💻 로컬 테스트용 (VS Code Live Server)
      VWORLD_LOCAL_KEY: '97924A5C-5676-37C0-9BDC-BC42C3B82028',
      VWORLD_LOCAL_DOMAIN: 'http://127.0.0.1:5500',

      // 🚀 배포용 (GitHub Pages)
      VWORLD_PROD_KEY: 'F781960D-00D4-30EB-A0EA-D4051FFAE5F4',
      VWORLD_PROD_DOMAIN: 'https://sakz-han.github.io',

      DEFAULT_KAKAO_REST: '',
      DEFAULT_KAKAO_JS: ''
    };

    const BASE_API_URL = 'https://apis.data.go.kr/1613000/BldRgstHubService';
    const KAKAO_ADDR_URL = 'https://dapi.kakao.com/v2/local/search/address.json';
    const KAKAO_KEYWORD_URL = 'https://dapi.kakao.com/v2/local/search/keyword.json';
    const WFS_URL = 'https://vworld-proxy-vercel.vercel.app/api/vworld';
    const WFS_MAX = '&maxFeatures=1';

    const WFS_ZONING_LAYERS = [
      { typeName: 'lt_c_uq111', label: '도시지역' },
      { typeName: 'lt_c_uq112', label: '관리지역' },
      { typeName: 'lt_c_uq113', label: '농림지역' },
      { typeName: 'lt_c_uq114', label: '자연환경보전지역' },
    ];

    const FIELD_GUIDE = [
      { key: 'bldNm', label: '건물(단지)명' },
      { key: 'mainPurpsCdNm', label: '주용도' },
      { key: 'useAprDay', label: '준공일(사용승인일)' },
      { key: 'prposArea1Nm', label: '용도지역' },
      { key: 'platArea', label: '대지면적' },
      { key: 'archArea', label: '건축면적' },
      { key: 'totArea', label: '연면적' },
      { key: 'bcRat', label: '건폐율 (%)' },
      { key: 'vlRat', label: '용적률 (%)' },
      { key: 'grndFlrCnt', label: '단지 내 지상 최고층수' },
      { key: 'hgt', label: '단지 내 최고 높이' },
      { key: 'hhldCnt', label: '세대수' },
      { key: 'totPkngCnt', label: '총 주차대수' },
      { key: 'mainBldCnt', label: '주건축물수' },
    ];

    let _addrDocs = [];
    let _lastRawData = null;
    let _subItems = [];
    let _lastCoords = null;
    let _currentTab = 'result';
    let _mapInstance = null;
    let _kakaoSdkPromise = null;
    let _kakaoSdkKey = null;

    // ═══════════════════════════════════════════════════════════
    //  초기화 & UI 토글
    // ═══════════════════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', () => {
      const savedRest = localStorage.getItem('kakao_key') || APP_CONFIG.DEFAULT_KAKAO_REST;
      const savedJs = localStorage.getItem('kakao_js_key') || APP_CONFIG.DEFAULT_KAKAO_JS;
      if (savedRest) document.getElementById('kakaoKey').value = savedRest;
      if (savedJs) document.getElementById('kakaoJsKey').value = savedJs;
      checkKakaoKey();
      // 키가 없으면 설정 패널 자동 펼침
      if (!savedRest) document.getElementById('settings').classList.add('open');
    });

    function toggleStatus() {
      document.getElementById('statusGroup').classList.toggle('open');
    }
    function toggleSettings() {
      document.getElementById('settings').classList.toggle('open');
    }
    function openSheet() {
      document.getElementById('resultSheet').classList.add('open');
      document.getElementById('sheetBackdrop').classList.add('open');
    }
    function closeSheet() {
      document.getElementById('resultSheet').classList.remove('open');
      document.getElementById('sheetBackdrop').classList.remove('open');
    }

    function checkKakaoKey() {
      const key = document.getElementById('kakaoKey').value.trim();
      const jsKey = document.getElementById('kakaoJsKey').value.trim();
      const on = key.length > 10;
      document.getElementById('statusKakao').classList.toggle('on', on);
      document.getElementById('miniKakao').classList.toggle('on-kakao', on);
      if (key.length > 10) localStorage.setItem('kakao_key', key);
      if (jsKey.length > 10) localStorage.setItem('kakao_js_key', jsKey);
    }

    // 상태 미니닷 동기화 헬퍼
    function syncMini() {
      document.getElementById('miniKakao').classList.toggle('on-kakao', document.getElementById('statusKakao').classList.contains('on'));
      const p = document.getElementById('statusPortal');
      document.getElementById('miniPortal').classList.toggle('on-portal', p.classList.contains('on'));
      document.getElementById('miniPortal').classList.toggle('err', p.classList.contains('err'));
      document.getElementById('miniWfs').classList.toggle('on-wfs', document.getElementById('statusWfs').classList.contains('on'));
    }

    // ═══════════════════════════════════════════════════════════
    //  1. 주소 검색
    // ═══════════════════════════════════════════════════════════
    async function searchAddr() {
      const key = document.getElementById('kakaoKey').value.trim();
      const query = document.getElementById('addrInput').value.trim();
      if (!key) { document.getElementById('settings').classList.add('open'); return alert('Kakao REST API Key를 입력해주세요.'); }
      if (!query) return alert('주소를 입력해주세요.');

      setSearchLoading(true);
      const resultsEl = document.getElementById('addrResults');
      resultsEl.innerHTML = '';
      openSheet();

      try {
        const headers = { Authorization: `KakaoAK ${key}` };
        const domain = window.location.hostname || 'localhost';
        const vwSearchUrl =
          `${WFS_URL}?endpoint=search&service=search&request=search&version=2.0` +
          `&crs=EPSG:4326&size=15&page=1&query=${encodeURIComponent(query)}` +
          `&type=place&format=json&errorformat=json&key=${APP_CONFIG.VWORLD_KEY}&domain=${domain}`;

        const [addrRes, keywordRes, vwRes] = await Promise.all([
          fetch(`${KAKAO_ADDR_URL}?query=${encodeURIComponent(query)}&size=15`, { headers }).catch(() => null),
          fetch(`${KAKAO_KEYWORD_URL}?query=${encodeURIComponent(query)}&size=15`, { headers }).catch(() => null),
          fetch(vwSearchUrl).catch(() => null),
        ]);

        const addrData = addrRes && addrRes.ok ? await addrRes.json() : { documents: [] };
        const keywordData = keywordRes && keywordRes.ok ? await keywordRes.json() : { documents: [] };
        const vwData = vwRes && vwRes.ok ? await vwRes.json() : null;

        let vwDocs = [];
        if (vwData?.response?.status === 'OK' && vwData.response.result?.items) {
          vwDocs = vwData.response.result.items.map(item => {
            const parcel = item.address?.parcel || '';
            const road = item.address?.road || '';
            return {
              _type: 'keyword', _vworld: true,
              place_name: `[VWorld] ${item.title}`,
              address_name: parcel || road || item.title,
              road_address_name: road,
              x: item.point?.x, y: item.point?.y,
            };
          });
        }

        const combined = [
          ...(keywordData.documents || []).map(d => ({ ...d, _type: 'keyword' })),
          ...vwDocs,
          ...(addrData.documents || []).map(d => ({ ...d, _type: 'address' })),
        ];

        const uniqueDocs = [];
        const seen = new Set();
        for (const doc of combined) {
          const jibun = doc.address_name;
          if (jibun && !seen.has(jibun)) { seen.add(jibun); uniqueDocs.push(doc); }
        }

        _addrDocs = uniqueDocs;
        if (_addrDocs.length === 0) {
          resultsEl.innerHTML = `<div style="padding:30px 20px;color:var(--warn);font-size:14px;text-align:center;">검색 결과 없음</div>`;
          return;
        }
        renderAddrList(_addrDocs);
      } catch (e) {
        resultsEl.innerHTML = `<div style="padding:20px;color:var(--warn);font-size:14px;">⚠️ 검색 오류: ${e.message}</div>`;
      } finally {
        setSearchLoading(false);
      }
    }

    function renderAddrList(docs) {
      const html = docs.map((doc, idx) => {
        const isKeyword = doc._type === 'keyword';
        const placeNm = doc.place_name || '';
        const roadNm = doc.road_address?.address_name || doc.road_address_name || '';
        const jibunNm = doc.address?.address_name || doc.address_name || '';
        const hasRoad = !!roadNm;
        return `<div class="addr-item" onclick="handleAddrSelect(${idx})">
      ${isKeyword ? `<div class="addr-main" style="color:var(--accent2);margin-bottom:6px;">${placeNm}</div>` : ''}
      <div class="addr-main" style="${isKeyword ? 'font-size:12px;font-weight:400;' : ''}">
        <span class="addr-type ${hasRoad ? 'road' : 'jibun'}">${hasRoad ? '도로명' : '지번'}</span>
        ${hasRoad ? roadNm : jibunNm}
      </div>
      ${hasRoad && jibunNm ? `<div class="addr-sub" style="margin-top:4px;">지번: ${jibunNm}</div>` : ''}
    </div>`;
      }).join('');
      document.getElementById('addrResults').innerHTML = html;
    }

    function setSearchLoading(b) {
      document.getElementById('searchBtn').disabled = b;
      document.getElementById('btnText').innerHTML = b ? '<div class="spinner"></div>' : '검색';
    }

    // ═══════════════════════════════════════════════════════════
    //  2. VWorld WFS 통신
    // ═══════════════════════════════════════════════════════════
    function buildWfsUrl(typeName, lng, lat) {
      const isLocal = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';
      const apiKey = isLocal ? APP_CONFIG.VWORLD_LOCAL_KEY : APP_CONFIG.VWORLD_PROD_KEY;
      const domain = isLocal ? APP_CONFIG.VWORLD_LOCAL_DOMAIN : APP_CONFIG.VWORLD_PROD_DOMAIN;

      return `${WFS_URL}?endpoint=wfs&SERVICE=WFS&VERSION=1.1.0&REQUEST=GetFeature` +
        `&TYPENAME=${typeName}` +
        `&SRSNAME=EPSG:4326` +
        `&CQL_FILTER=INTERSECTS(geom,POINT(${lng}%20${lat}))` +
        `&outputFormat=application%2Fjson&maxFeatures=1` +
        `&key=${apiKey}&domain=${domain}`;
    }

    async function fetchWfsZoning(lng, lat) {
      const wfsBadge = document.getElementById('statusWfs');

      const zoningFetches = WFS_ZONING_LAYERS.map(layer =>
        fetch(buildWfsUrl(layer.typeName, lng, lat))
          .then(r => r.ok ? r.json() : null)
          .catch(() => null)
      );

      const zoningResults = await Promise.allSettled(zoningFetches);

      let area1Str = '';
      for (const settled of zoningResults) {
        if (settled.status !== 'fulfilled' || !settled.value) continue;
        const json = settled.value;
        if ((json?.features?.length ?? 0) === 0) continue;

        const props = json.features[0].properties || {};
        const nameProp = props.uname || props.prposArea1Nm || props.uq_nm || props.ud_nm || props.uq111_nm || props.zone_nm || props.name;

        if (nameProp) { area1Str = String(nameProp).trim(); break; }
      }

      const hasData = !!area1Str;
      wfsBadge.className = `status-badge badge-wfs ${hasData ? 'on' : ''}`;
      syncMini();

      console.log('[WFS] 대표 용도지역 결과:', area1Str || '없음');
      return { area1Str: area1Str || '—' };
    }

    async function fetchWfsBldgInfo(lng, lat) {
      const url = buildWfsUrl('lt_c_bldginfo', lng, lat);
      try {
        const res = await fetch(url);
        if (!res.ok) return null;
        const text = await res.text();
        if (!text || text.trim().startsWith('<')) return null;
        const json = JSON.parse(text);
        if ((json?.features?.length ?? 0) > 0) return json.features[0].properties;
      } catch (e) { console.warn('[WFS] 건축물정보 호출 실패:', e.message); }
      return null;
    }

    // ═══════════════════════════════════════════════════════════
    //  3. 주소 선택 → 건축물대장 + VWorld 병렬 수집
    // ═══════════════════════════════════════════════════════════
    async function handleAddrSelect(idx) {
      const doc = _addrDocs[idx];
      const lng = parseFloat(doc.x);
      const lat = parseFloat(doc.y);
      const key = document.getElementById('kakaoKey').value.trim();

      closeSheet();
      switchTab('result');

      const externalLinks = document.getElementById('externalLinks');
      const naverBtn = document.getElementById('naverBtn');
      const eumBtn = document.getElementById('eumBtn');

      let searchKeyword = (doc.place_name || doc.road_address?.address_name || doc.address?.address_name || doc.address_name || '').replace('[VWorld] ', '');

      // 1. 기기 판별 (모바일 vs PC)
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

      // 2. 판별 결과에 따른 네이버 링크 변경
      if (isMobile) {
        // 모바일일 경우 네이버 지도 검색으로 연결
        naverBtn.href = `https://m.map.naver.com/search2/search.naver?query=${encodeURIComponent(searchKeyword)}`;
      } else {
        // PC일 경우 기존 실거래가 페이지로 연결
        naverBtn.href = `https://new.land.naver.com/complexes?ms=${lat},${lng},17&a=APT:ABYG:JGC&e=RETAIL&sk=${encodeURIComponent(searchKeyword)}`;
      }

      // 3. 버튼 표시 (이 코드가 조건문 바깥에 있으므로 어떤 경우든 버튼은 유지됩니다)
      externalLinks.style.display = 'flex';

      // (이후 건축물대장 API 호출 로직은 그대로 두시면 됩니다)
      document.getElementById('panel-result').innerHTML = `
    <div class="notice-box info" style="margin:auto;">
      <div class="spinner light" style="margin:0 auto 16px;width:30px;height:30px;"></div>
      <div class="notice-title">데이터 통합 수집 중...</div>
      <div class="notice-desc">총괄표제부 · 표제부 · VWorld WFS 데이터를 수집하고 있습니다.</div>
    </div>`;
      document.getElementById('panel-raw').innerHTML = '';
      _mapInstance = null;

      let addrObj = doc.address;
      if (!addrObj && doc.address_name) {
        try {
          const r = await fetch(`${KAKAO_ADDR_URL}?query=${encodeURIComponent(doc.address_name)}`,
            { headers: { Authorization: `KakaoAK ${key}` } });
          const data = await r.json();
          if (data.documents?.length > 0) addrObj = data.documents[0].address;
        } catch (e) { console.warn('키워드→주소 변환 실패:', e); }
      }

      if (!addrObj || !addrObj.b_code) {
        document.getElementById('panel-result').innerHTML =
          `<div class="notice-box err" style="margin:auto;">
        <div class="notice-title">⚠️ 주소 정보 누락</div>
        <div class="notice-desc">해당 장소의 정확한 지번(법정동코드)을 확인할 수 없어 조회를 중단합니다.</div>
      </div>`;
        return;
      }

      const bCode = addrObj.b_code;
      const sigunguCd = bCode.slice(0, 5);
      const bjdongCd = bCode.slice(5, 10);
      const platGbCd = addrObj.mountain_yn === 'Y' ? '1' : '0';
      const bun = String(parseInt(addrObj.main_address_no) || 0).padStart(4, '0');
      const ji = String(parseInt(addrObj.sub_address_no || '0') || 0).padStart(4, '0');
      const pnuLandType = addrObj.mountain_yn === 'Y' ? '2' : '1';
      const PNU = bCode + pnuLandType + bun + ji;
      eumBtn.href = `https://www.eum.go.kr/web/ar/lu/luLandDet.jsp?isNoScr=script&mode=search&pnu=${PNU}`;
      const base = `ServiceKey=${APP_CONFIG.SERVICE_KEY}&sigunguCd=${sigunguCd}&bjdongCd=${bjdongCd}&platGbCd=${platGbCd}&bun=${bun}&ji=${ji}&_type=json`;

      const urlRecap = `${BASE_API_URL}/getBrRecapTitleInfo?${base}&numOfRows=10&pageNo=1`;
      const urlTitle = `${BASE_API_URL}/getBrTitleInfo?${base}&numOfRows=100&pageNo=1`;

      try {
        const [[resRecap, resTitle], zoningResult, wfsBldgProps] = await Promise.all([
          Promise.all([fetch(urlRecap), fetch(urlTitle)]),
          fetchWfsZoning(lng, lat),
          fetchWfsBldgInfo(lng, lat),
        ]);

        const [textRecap, textTitle] = await Promise.all([resRecap.text(), resTitle.text()]);

        if (resRecap.status === 403 || textRecap.toLowerCase().includes('forbidden'))
          throw new Error('공공데이터포털 403 Forbidden - API 접근 권한 없음');
        if (textRecap.trim().startsWith('<'))
          throw new Error('공공데이터포털 서버 지연(XML 에러 반환 중)');

        let jsonRecap;
        try { jsonRecap = JSON.parse(textRecap); }
        catch (e) { throw new Error(`공공데이터포털 서버 일시 장애: ${textRecap.substring(0, 30)}...`); }

        let maxFlr = 0, maxHgt = 0, useAprDay = '';
        let jsonTitle = null;
        try {
          if (!textTitle.startsWith('<')) {
            jsonTitle = JSON.parse(textTitle);
            const titleItems = jsonTitle?.response?.body?.items?.item;
            if (titleItems) {
              const arr = Array.isArray(titleItems) ? titleItems : [titleItems];
              arr.forEach(t => {
                const flr = parseFloat(t.grndFlrCnt) || 0;
                const hgt = parseFloat(t.heit || t.hgt) || 0;
                if (flr > maxFlr) maxFlr = flr;
                if (hgt > maxHgt) maxHgt = hgt;
                if (!useAprDay && t.useAprDay && String(t.useAprDay).length === 8)
                  useAprDay = String(t.useAprDay);
              });
            }
          }
        } catch (e) { console.warn('표제부 파싱 실패:', e); }

        let mainItemsObj = jsonRecap?.response?.body?.items?.item;
        if (!mainItemsObj || (Array.isArray(mainItemsObj) && mainItemsObj.length === 0))
          mainItemsObj = jsonTitle?.response?.body?.items?.item;

        if (Array.isArray(mainItemsObj) && mainItemsObj.length > 1) {
          const 집합 = mainItemsObj.filter(i => String(i.regstrGbCd) === '2');
          if (집합.length > 0) {
            mainItemsObj = 집합;
          } else {
            mainItemsObj = [mainItemsObj.reduce((best, cur) =>
              (parseFloat(cur.hhldCnt) || 0) > (parseFloat(best.hhldCnt) || 0) ? cur : best)];
          }
        }

        let titleItemsArr = jsonTitle?.response?.body?.items?.item;
        _subItems = titleItemsArr ? (Array.isArray(titleItemsArr) ? titleItemsArr : [titleItemsArr]) : [];

        let isVWorldOnly = false;
        if ((!mainItemsObj || (Array.isArray(mainItemsObj) && mainItemsObj.length === 0)) && wfsBldgProps) {
          mainItemsObj = [{}];
          isVWorldOnly = true;
        }

        const ZERO_INVALID_FIELDS = new Set(['platArea', 'archArea', 'totArea', 'bcRat', 'vlRat', 'hgt']);
        function isBldgEmpty(key, val) {
          if (val === undefined || val === null) return true;
          if (typeof val === 'object') return true;
          if (String(val).trim() === '') return true;
          if (val === '—') return true;
          if (ZERO_INVALID_FIELDS.has(key) && parseFloat(val) === 0) return true;
          return false;
        }

        if (mainItemsObj) {
          const mainItems = Array.isArray(mainItemsObj) ? mainItemsObj : [mainItemsObj];
          mainItems.forEach(r => {
            r._source = {};
            const defaultSrc = r.regstrKindCd === '1' ? '총괄' : '표제부';
            FIELD_GUIDE.forEach(g => r._source[g.key] = defaultSrc);

            if (maxFlr > 0) { r.grndFlrCnt = maxFlr; r._source['grndFlrCnt'] = '표제부'; }
            else { r.grndFlrCnt = r.grndFlrCnt || '—'; }

            if (maxHgt > 0) { r.hgt = maxHgt; r._source['hgt'] = '표제부'; }
            else { r.hgt = r.hgt || '—'; }

            const isEmptyDate = !r.useAprDay || typeof r.useAprDay === 'object' || String(r.useAprDay).trim() === '';
            if (isEmptyDate && useAprDay) r.useAprDay = useAprDay;

            if (isBldgEmpty('prposArea1Nm', r.prposArea1Nm) && zoningResult.area1Str !== '—') {
              r.prposArea1Nm = zoningResult.area1Str;
              r._source['prposArea1Nm'] = 'vworld';
            } else {
              r.prposArea1Nm = r.prposArea1Nm || '—';
            }

            if (wfsBldgProps) {
              const mapWfs = {
                mainPurpsCdNm: wfsBldgProps.usability,
                useAprDay: wfsBldgProps.useapr_day,
                platArea: wfsBldgProps.platarea,
                archArea: wfsBldgProps.archarea,
                totArea: wfsBldgProps.totalarea,
                bcRat: wfsBldgProps.bc_rat,
                vlRat: wfsBldgProps.vl_rat,
                grndFlrCnt: wfsBldgProps.grnd_flr,
                hgt: wfsBldgProps.height,
              };
              Object.keys(mapWfs).forEach(k => {
                const wfsVal = mapWfs[k];
                if (isBldgEmpty(k, r[k]) && !isBldgEmpty(k, wfsVal)) {
                  r[k] = wfsVal; r._source[k] = 'vworld';
                }
              });
              ZERO_INVALID_FIELDS.forEach(k => { if (isBldgEmpty(k, r[k])) r[k] = '—'; });
            }
          });

          _lastRawData = isVWorldOnly
            ? { response: { header: { resultCode: '00', resultMsg: 'VWORLD ONLY' }, body: { items: { item: mainItemsObj } } } }
            : (jsonRecap?.response?.body?.totalCount === '0' && jsonTitle?.response?.body?.totalCount !== '0')
              ? jsonTitle : jsonRecap;
        } else {
          _lastRawData = jsonRecap;
        }

        const portalBadge = document.getElementById('statusPortal');
        if (!isVWorldOnly && _lastRawData?.response?.header?.resultCode === '00') {
          portalBadge.classList.add('on'); portalBadge.classList.remove('err');
        } else { portalBadge.classList.remove('on'); }
        syncMini();

        _lastCoords = { lat, lng };
        renderActiveView();

      } catch (e) {
        document.getElementById('statusPortal').classList.remove('on');
        document.getElementById('statusPortal').classList.add('err');
        syncMini();
        document.getElementById('panel-result').innerHTML =
          `<div class="notice-box err" style="margin:auto;">
        <div class="notice-title">⚠️ 데이터 호출 오류</div>
        <div class="notice-desc">${e.message}</div>
      </div>`;
        _lastRawData = null;
      }
    }

    // ═══════════════════════════════════════════════════════════
    //  4. Kakao 지도
    // ═══════════════════════════════════════════════════════════
    function injectKakaoMapScript(appKey) {
      if (appKey === _kakaoSdkKey && _kakaoSdkPromise) return _kakaoSdkPromise;
      _kakaoSdkKey = appKey;
      _kakaoSdkPromise = new Promise((resolve, reject) => {
        if (window.kakao?.maps) { resolve(); return; }
        const script = document.createElement('script');
        script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${appKey}&autoload=false`;
        script.onload = () => kakao.maps.load(resolve);
        script.onerror = reject;
        document.head.appendChild(script);
      });
      return _kakaoSdkPromise;
    }

    async function renderKakaoMap(lat, lng) {
      const kakaoKey = document.getElementById('kakaoJsKey').value.trim();
      if (!kakaoKey) return;
      const resultPanel = document.getElementById('panel-result');

      let mapCard = document.getElementById('kakaoMapCard');
      if (!mapCard) {
        mapCard = document.createElement('div');
        mapCard.id = 'kakaoMapCard';
        mapCard.className = 'data-card';
        mapCard.innerHTML = `
      <div class="card-header"><h3>📍 위치 지도</h3></div>
      <div class="map-container" id="kakaoMapDiv"></div>`;
        resultPanel.appendChild(mapCard);
      }

      try {
        await injectKakaoMapScript(kakaoKey);
        const container = document.getElementById('kakaoMapDiv');
        const latlng = new kakao.maps.LatLng(lat, lng);
        if (_mapInstance) {
          _mapInstance.setCenter(latlng);
        } else {
          _mapInstance = new kakao.maps.Map(container, { center: latlng, level: 3 });
          new kakao.maps.Marker({ position: latlng, map: _mapInstance });
        }
        setTimeout(() => { if (_mapInstance) _mapInstance.relayout(); _mapInstance && _mapInstance.setCenter(latlng); }, 200);
      } catch (e) { console.warn('카카오맵 로드 실패:', e); }
    }

    // ═══════════════════════════════════════════════════════════
    //  5. 탭 전환
    // ═══════════════════════════════════════════════════════════
    function switchTab(tabId) {
      _currentTab = tabId;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`tab-${tabId}`).classList.add('active');
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById(`panel-${tabId}`).classList.add('active');
      if (tabId === 'raw' && _lastRawData) renderRawPanel();
    }

    // ═══════════════════════════════════════════════════════════
    //  6. 렌더링
    // ═══════════════════════════════════════════════════════════
    function renderActiveView() {
      if (!_lastRawData) return;
      renderResultPanel();
      if (_currentTab === 'raw') renderRawPanel();
    }

    function renderRawPanel() {
      const rawStr = JSON.stringify(_lastRawData, null, 2)
        .replace(/"([^"]+)":/g, '<span class="j-key">"$1"</span>:')
        .replace(/: "([^"]*)"/g, ': <span class="j-str">"$1"</span>')
        .replace(/: (\d+\.?\d*)/g, ': <span class="j-num">$1</span>');
      document.getElementById('panel-raw').innerHTML = `<pre class="json-view">${rawStr}</pre>`;
    }

    function renderResultPanel() {
      const panel = document.getElementById('panel-result');
      const itemsObj = _lastRawData?.response?.body?.items?.item;
      const resultCode = _lastRawData?.response?.header?.resultCode;

      if (resultCode !== '00') {
        panel.innerHTML = `<div class="notice-box err"><div class="notice-title">API 오류</div><div class="notice-desc">${_lastRawData?.response?.header?.resultMsg}</div></div>`;
        return;
      }
      if (!itemsObj) {
        panel.innerHTML = `<div class="notice-box info" style="margin:auto;"><div class="notice-title">데이터 없음</div><div class="notice-desc">해당 지번에는 총괄표제부 데이터가 없습니다.<br>(단독주택, 소규모 상가 등 일반건축물)</div></div>`;
        return;
      }

      const items = Array.isArray(itemsObj) ? itemsObj : [itemsObj];
      let html = '';

      items.forEach((item, idx) => {
        const isRecap = item.regstrKindCd === '1';
        let alertBanner = '';
        if (isRecap && _subItems.length > 0) {
          alertBanner = `
        <div style="background:rgba(0,150,255,.08);padding:12px 16px;font-size:12px;color:var(--accent2);border-bottom:1px solid var(--border);line-height:1.5;">
          💡 <b>안내:</b> 현재 카드는 단지 전체(총괄) 정보입니다. 부속 건물 상세는 하단 <b>[📋 동별 상세 정보]</b>를 확인하세요.
        </div>`;
        }

        html += `<div class="data-card">
      <div class="card-header">
        <h3>${item.bldNm || '단지명 없음'}</h3>
        <span style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;">#${idx + 1}</span>
      </div>
      ${alertBanner}
      <div class="field-grid">`;

        FIELD_GUIDE.forEach(guide => {
          let rawVal = item[guide.key];
          let val = (rawVal !== undefined && rawVal !== null && rawVal !== '' && typeof rawVal !== 'object')
            ? String(rawVal).trim() : '—';
          if (val === '') val = '—';

          let colorClass = '';
          let sourceBadge = '';

          if (val === '—') {
            colorClass = 'dim';
          } else {
            const src = item._source?.[guide.key];
            if (src === 'vworld') {
              colorClass = 'src-vworld';
              sourceBadge = '<span style="font-size:10px;color:var(--yellow);opacity:.8;margin-left:4px;">(VW)</span>';
            } else if (src === '표제부') {
              colorClass = 'src-bldg';
              sourceBadge = '<span style="font-size:10px;color:var(--accent2);opacity:.8;margin-left:4px;">(표제부)</span>';
            } else if (src === '총괄') {
              colorClass = 'src-bldg';
              sourceBadge = '<span style="font-size:10px;color:var(--muted);margin-left:4px;">(총괄)</span>';
            }
          }

          if (val !== '—') {
            if (['totArea', 'archArea', 'platArea'].includes(guide.key)) {
              const num = parseFloat(val);
              if (!isNaN(num)) val = num.toLocaleString('ko-KR') + ' ㎡';
            } else if (guide.key === 'grndFlrCnt') {
              val += ' 층';
            } else if (guide.key === 'hgt') {
              val += ' m';
            } else if (guide.key === 'hhldCnt') {
              const num = parseFloat(val);
              if (!isNaN(num)) val = num.toLocaleString('ko-KR') + ' 세대';
            } else if (guide.key === 'useAprDay' && val.length === 8) {
              const year = parseInt(val.substring(0, 4));
              const month = val.substring(4, 6);
              const day = val.substring(6, 8);
              const age = new Date().getFullYear() - year + 1;
              val = `${year}-${month}-${day} <span style="font-size:12px;opacity:.8;">(${age}년차)</span>`;
            } else if (guide.key === 'totPkngCnt') {
              const parkNum = parseFloat(val);
              const hhldNum = parseFloat(item['hhldCnt']);
              if (!isNaN(parkNum)) {
                val = parkNum.toLocaleString('ko-KR') + '대';
                if (!isNaN(hhldNum) && hhldNum > 0)
                  val += ` <span style="font-size:12px;opacity:.8;">(세대당 ${(parkNum / hhldNum).toFixed(2)}대)</span>`;
              }
            }
          }

          html += `<div class="field-cell">
        <div class="fc-label">${guide.label} ${sourceBadge}</div>
        <div class="fc-val ${colorClass}">${val}</div>
      </div>`;
        });

        html += `</div></div>`;
      });

      // 동별 상세 카드
      if (_subItems.length > 0) {
        html += `
      <div class="data-card">
        <div class="card-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'" style="cursor:pointer;">
          <h3>📋 동별 상세 정보</h3>
          <span style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;">${_subItems.length}개 동 ▼</span>
        </div>
        <div style="display:none;">`;

        _subItems.forEach((sub, sidx) => {
          const dongLabel = sub.dongNm?.trim() || sub.bldNm?.trim() || `동 #${sidx + 1}`;
          const SUB_FIELDS = [
            { key: 'archArea', label: '건축면적' },
            { key: 'totArea', label: '연면적' },
            { key: 'grndFlrCnt', label: '최고층수' },
            { key: 'heit', label: '최고높이' },
            { key: 'hhldCnt', label: '세대수' },
          ];

          html += `<div style="border-top:1px solid var(--border);">
        <div class="card-header" style="background:var(--bg);">
          <h3 style="color:var(--accent);font-size:13px;">${dongLabel}</h3>
          <span style="font-size:11px;color:var(--muted);">표제부</span>
        </div>
        <div class="field-grid">`;

          SUB_FIELDS.forEach(guide => {
            let rawVal = sub[guide.key];
            let val = (rawVal !== undefined && rawVal !== null && rawVal !== '' && typeof rawVal !== 'object')
              ? String(rawVal).trim() : '—';
            if (val === '') val = '—';
            if (val !== '—') {
              if (['totArea', 'archArea'].includes(guide.key)) { const n = parseFloat(val); if (!isNaN(n)) val = n.toLocaleString('ko-KR') + ' ㎡'; }
              else if (guide.key === 'grndFlrCnt') val += ' 층';
              else if (guide.key === 'heit') val += ' m';
              else if (guide.key === 'hhldCnt') { const n = parseFloat(val); if (!isNaN(n)) val = n.toLocaleString('ko-KR') + ' 세대'; }
            }
            html += `<div class="field-cell">
          <div class="fc-label">${guide.label}</div>
          <div class="fc-val ${val === '—' ? 'dim' : 'src-bldg'}">${val}</div>
        </div>`;
          });

          html += `</div></div>`;
        });

        html += `</div></div>`;
      }

      panel.innerHTML = html;
      if (_lastCoords) renderKakaoMap(_lastCoords.lat, _lastCoords.lng);
    }
  </script>
</body>

</html>
